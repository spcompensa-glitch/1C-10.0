    <script>
        // [V110.380] SILENCE PROTOCOL 2.0: Suppress redundant production warnings early
        (function() {
            const originalWarn = console.warn;
            const originalError = console.error;
            const silencePatterns = [
                "cdn.tailwindcss.com",
                "in-browser Babel transformer",
                "Vision Proof asset not ready",
                "Source map error",
                "DevTools failed to load source map",
                "Babel script"
            ];

            const silenceInterceptor = function(originalFunc) {
                return function(...args) {
                    const msg = (args[0] || "").toString();
                    if (silencePatterns.some(p => msg.includes(p))) return;
                    originalFunc.apply(console, args);
                };
            };

            console.warn = silenceInterceptor(originalWarn);
            console.error = silenceInterceptor(originalError);
        })();
    </script>

        // PROTOCOLO LEGADO REMOVIDO
        (function() {
            const originalWarn = console.warn;
            console.warn = function(...args) {
                const msg = args[0] || "";
                if (typeof msg === 'string' && (
                    msg.includes("cdn.tailwindcss.com") || 
                    msg.includes("in-browser Babel transformer") ||
                    msg.includes("Vision Proof asset not ready")
                )) {
                    return; // Intercept and silence
                }
                originalWarn.apply(console, args);
            };

                let sum = 0;
                for (let j = 0; j < period; j++) {

        // --- Hook: Pulse Monitor (V4.1 Elite Resilience) ---
        const usePulseMonitor = () => {
            const [latency, setLatency] = useState(0);
            // V15.1.2: Optimistic 'DEGRADED' to avoid blocking overlay on slow loads
            const [status, setStatus] = useState('DEGRADED');
            const [isThinking, setIsThinking] = useState(false); // [V18.1] Global Thinking State
            const lastUpdateRef = useRef(Date.now());
            const channelRef = useRef('NONE');

            useEffect(() => {
                let unsubscribe = null;
                const startTime = Date.now();
                console.log("📡 Pulse Monitor: System Booting [", sovereign_rtdb ? 'sovereign_rtdb-READY' : 'sovereign_rtdb-MISSING', "]");

                // Immediate REST Check on Mount (Eliminates 12s wait)
                const immediateCheck = async () => {
                    try {
                        const res = await fetch(API_BASE + '/api/system/state');
                        if (res.ok) {
                            console.log("📡 Pulse Monitor: Immediate REST Check Success ✅");
                            const data = await res.json();
                            if (data && typeof data.is_thinking !== 'undefined') {
                                setIsThinking(data.is_thinking);
                            }
                            lastUpdateRef.current = Date.now();
                            setStatus('ONLINE');
                            channelRef.current = 'REST-BOOT';
                        } else {
                            console.warn("📡 Pulse Monitor: Immediate REST Check Failed (Non-OK)");
                        }
                    } catch (e) {
                        console.warn("📡 Pulse Monitor: Immediate REST Check Failed (Network Error)", e);
                    }
                };
                immediateCheck();

                // Primary: Firebase sovereign_rtdb
                if (sovereign_rtdb) {
                    try {
                        const pulseRef = sovereign_rtdb.ref('system_pulse');
                        unsubscribe = pulseRef.on('value', (snapshot) => {
                            const data = snapshot.val();
                            if (data && data.timestamp) {
                                lastUpdateRef.current = Date.now();
                                const lat = Date.now() - data.timestamp;
                                setLatency(Math.max(0, lat));
                                setStatus('ONLINE');
                                channelRef.current = 'sovereign_rtdb';
                            } else {
                                console.warn("📡 Pulse Monitor: sovereign_rtdb Pulse received but content is malformed", data);
                            }
                        }, (err) => {
                            // If it's a permission error, we don't spam the console since we have REST fallback
                            if (err && err.message && err.message.includes('permission_denied')) {
                                console.warn("📡 Pulse Monitor: sovereign_rtdb Access Denied (system_pulse). Using REST Fallback Only.");
                            } else {
                                console.error("📡 Pulse Monitor: sovereign_rtdb Subscription Error:", err);
                            }
                        });

                        // [V18.1] Listen for Thinking State in sovereign_rtdb
                        const thinkingRef = sovereign_rtdb.ref('chat_status/is_thinking');
                        thinkingRef.on('value', (snap) => {
                            if (snap.exists()) setIsThinking(snap.val());
                        });

                    } catch (e) {
                        console.error("📡 Pulse Monitor: sovereign_rtdb Logic Failure:", e);
                    }
                }

                // Secondary: REST API Pulse (Dual Heartbeat)
                const onRestPulse = () => {
                    lastUpdateRef.current = Date.now();
                    // If we were offline or warning, upgrade to DEGRADED
                    setStatus(prev => (prev === 'OFFLINE' || prev === 'WARNING') ? 'DEGRADED' : prev);
                    channelRef.current = 'REST';
                };
                window.addEventListener('rest-pulse', onRestPulse);

                const checker = setInterval(async () => {
                    const diff = Date.now() - lastUpdateRef.current;

                    // Fallback: If heart beating via sovereign_rtdb is slow (> 12s), force a REST check to verify health
                    if (diff > 12000) {
                        try {
                            const res = await fetch(API_BASE + '/api/system/state');
                            if (res.ok) {
                                const data = await res.json();
                                if (data && typeof data.is_thinking !== 'undefined') {
                                    setIsThinking(data.is_thinking);
                                }
                                lastUpdateRef.current = Date.now();
                                setStatus('ONLINE');
                                channelRef.current = 'REST-PING';
                                return; // Optimized: Heartbeat restored
                            }
                        } catch (e) {
                            console.warn("Pulse Fallback REST Failed:", e);
                        }
                    }

                    // Update Status based on latency (Only AFTER fallback check)
                    if (diff > 45000) {
                        setStatus('OFFLINE');
                    } else if (diff > 12000) {
                        setStatus('DEGRADED');
                    } else {
                        setStatus('ONLINE');
                    }
                }, 5000);

                return () => {
                    if (unsubscribe && sovereign_rtdb) {
                        try {
                            sovereign_rtdb.ref('system_pulse').off('value', unsubscribe);
                        } catch (e) { }
                    }
                    window.removeEventListener('rest-pulse', onRestPulse);
                    clearInterval(checker);
                };
            }, [sovereign_rtdb]);

            return { latency, status, channel: channelRef.current, isThinking };

                        setData(message.data);

                return () => window.removeEventListener('sovereign-packet', handlePacket);

            useEffect(() => {

                                    stabilization_progress: val.stabilization_progress || 1.0
                                }));
                            }
                        }
                    } catch (e) { }
                };
                const itv = setInterval(fetchFallback, 45000); // [V110.138] Relaxed from 15s to prevent 429/504
                const onVisibilityChange = () => { if (document.visibilityState === 'visible') fetchFallback(); };
                document.addEventListener('visibilitychange', onVisibilityChange);
                return () => { clearInterval(itv); document.removeEventListener('visibilitychange', onVisibilityChange); };

        const useBancaRT = (initialData) => {

        const TradingChart = ({ symbol, entryPrice, stopLossPrice, targetPrice, side, pnlFallback, slotId, slotType }) => {
            const chartContainerRef = useRef();
            const chartRef = useRef();
            const seriesRef = useRef();
            const linesRef = useRef([]);
            const [lastPrice, setLastPrice] = useState(null);
            const [tf, setTf] = useState('15'); // Default 15m
            const isMounted = useRef(true);

            // V9.0 Trend Data State
            const [trendData, setTrendData] = useState({ trend: 'sideways', pattern: 'none', trend_strength: 0 });

            // V9.0 Trend Fetch
            useEffect(() => {
                if (!symbol) return;
                const fetchTrend = async () => {
                    try {
                        const apiSymbol = String(symbol || '').replace('.P', '');
                        const res = await fetch(API_BASE + '/api/trend/' + apiSymbol);
                        if (res.ok) setTrendData(await res.json());
                    } catch (e) { console.warn('Trend fetch error:', e); }
                };
                fetchTrend();
                const interval = setInterval(fetchTrend, 60000); // Refresh every 1 min
                return () => clearInterval(interval);
            }, [symbol]);

            const timeframes = [
                { label: '1m', value: '1' },
                { label: '5m', value: '5' },
                { label: '15m', value: '15' },
                { label: '1h', value: '60' },
                { label: '4h', value: '240' },
            ];

            const fetchHistory = async () => {
                if (!symbol || !isMounted.current) return;
                let apiSymbol = String(symbol || '').replace('.P', '').replace('.p', '').trim();
                if (!apiSymbol.endsWith('-SWAP')) {
                    if (apiSymbol.endsWith('USDT')) {
                        apiSymbol = apiSymbol.replace('USDT', '-USDT-SWAP');
                    } else {
                        apiSymbol = apiSymbol + '-USDT-SWAP';
                    }
                }
                
                let okxTf = "15m";
                if (tf === "1") okxTf = "1m";
                else if (tf === "5") okxTf = "5m";
                else if (tf === "15") okxTf = "15m";
                else if (tf === "30") okxTf = "30m";
                else if (tf === "60") okxTf = "1H";
                else if (tf === "120") okxTf = "2H";
                else if (tf === "240") okxTf = "4H";
                else if (tf === "1440") okxTf = "1D";

                console.log(`[Chart] Fetching history from OKX for ${apiSymbol} (Display: ${symbol}) @ ${okxTf}`);
                try {
                    const response = await fetch(`https://www.okx.com/api/v5/market/candles?instId=${apiSymbol}&bar=${okxTf}&limit=300`);
                    const json = await response.json();

                    if (!isMounted.current || !seriesRef.current) return;

                    if (json.data && Array.isArray(json.data)) {
                        console.log(`[Chart] Received ${json.data.length} candles for ${symbol}`);
                        const klines = json.data.map(k => ({
                            time: parseInt(k[0]) / 1000,
                            open: parseFloat(k[1]),
                            high: parseFloat(k[2]),
                            low: parseFloat(k[3]),
                            close: parseFloat(k[4]),
                            volume: parseFloat(k[5])
                        })).sort((a, b) => a.time - b.time);

                        // Safety check: Ensure chart is still active before updating
                        if (!isMounted.current || !chartRef.current || !seriesRef.current) return;

                        try {
                            if (seriesRef.current) seriesRef.current.setData(klines);

                            // Indicators Calculation
                            if (volumeSeriesRef.current) {
                                volumeSeriesRef.current.setData(klines.map(k => ({
                                    time: k.time,
                                    value: k.volume,
                                    color: k.close >= k.open ? 'rgba(255, 255, 255, 0.3)' : 'rgba(239, 68, 68, 0.3)'
                                })));
                            }

                            if (ema20Ref.current) ema20Ref.current.setData(calculateSMA(klines, 100).filter(d => d !== null));
                            if (ema200Ref.current) ema200Ref.current.setData(calculateSMA(klines, 21).filter(d => d !== null));

                            // SuperTrend (10, 2)
                            if (stUpRef.current && stDownRef.current) {
                                const stData = calculateSuperTrend(klines, 10, 2);
                                const upD = []; const downD = []; const markers = []; let lDir = null;
                                stData.forEach(d => {
                                    if(!d) return;
                                    if(d.color === '#ffffff'){
                                        upD.push({time: d.time, value: d.value});
                                        if(lDir !== 1){ markers.push({time: d.time, position: 'belowBar', color: '#ffffff', shape: 'arrowUp', text: 'BUY'}); lDir = 1; }
                                    }else if(d.color === '#EF4444'){
                                        downD.push({time: d.time, value: d.value});
                                        if(lDir !== -1){ markers.push({time: d.time, position: 'aboveBar', color: '#EF4444', shape: 'arrowDown', text: 'SELL'}); lDir = -1; }
                                    }
                                });
                                stUpRef.current.setData(upD);
                                stDownRef.current.setData(downD);
                                if(seriesRef.current) { seriesRef.current.setMarkers(markers); }
                            }

                            // Pivot Points
                            const pivots = calculatePivotPoints(klines);
                            if (pivots && seriesRef.current) {
                                if (pivotLinesRef.current) pivotLinesRef.current.forEach(l => seriesRef.current.removePriceLine(l));
                                pivotLinesRef.current = [
                                    seriesRef.current.createPriceLine({ price: pivots.p, color: 'rgba(255, 255, 255, 0.4)', lineWidth: 1, lineStyle: 2, title: 'P' }),
                                    seriesRef.current.createPriceLine({ price: pivots.r1, color: 'rgba(255, 255, 255, 0.2)', lineWidth: 1, lineStyle: 2, title: 'R1' }),
                                    seriesRef.current.createPriceLine({ price: pivots.s1, color: 'rgba(239, 68, 68, 0.2)', lineWidth: 1, lineStyle: 2, title: 'S1' })
                                ];
                            }

                            // Zones Update (Base on entry)
                            if (zonesRef.current) {
                                zonesRef.current.setData(klines.map(k => ({ time: k.time, value: k.close })));
                            }
                        } catch (err) {
                            console.warn("[Chart] Update skipped (chart disposed)", err);
                        }
                    }
                } catch (e) { if (isMounted.current) console.error("History Error", e); }
            };

            const volumeSeriesRef = useRef();
            const ema20Ref = useRef();
            const ema200Ref = useRef();
            const stUpRef = useRef();
            const stDownRef = useRef();
            const pivotLinesRef = useRef([]);
            const zonesRef = useRef();

            useEffect(() => {
                if (!chartContainerRef.current) return;
                if (chartRef.current) { chartRef.current.remove(); }

                isMounted.current = true; // Ensure we are marked as mounted for this effect cycle
                let active = true;

                // Chart Configuration with dynamic height check
                const containerHeight = chartContainerRef.current.clientHeight || 250;
                const containerWidth = chartContainerRef.current.clientWidth || 400;

                const chart = LightweightCharts.createChart(chartContainerRef.current, {
                    width: containerWidth,
                    height: containerHeight,
                    layout: { background: { type: 'solid', color: 'transparent' }, textColor: '#cbd5e1' },
                    grid: { vertLines: { color: 'rgba(255, 255, 255, 0.03)', style: 1 }, horzLines: { color: 'rgba(255, 255, 255, 0.03)', style: 1 } },
                    rightPriceScale: {
                        borderColor: 'rgba(255, 255, 255, 0.1)',
                        autoScale: true,
                        scaleMargins: { top: 0.1, bottom: 0.1 }
                    },
                    timeScale: { borderColor: 'rgba(255, 255, 255, 0.1)', timeVisible: true },
                    crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
                    localization: {
                        priceFormatter: (price) => {
                            if (price >= 1000) return price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                            if (price >= 1) return price.toLocaleString('en-US', { minimumFractionDigits: 4, maximumFractionDigits: 4 });
                            if (price >= 0.001) return price.toLocaleString('en-US', { minimumFractionDigits: 6, maximumFractionDigits: 6 });
                            return price.toLocaleString('en-US', { minimumFractionDigits: 8, maximumFractionDigits: 8 });
                        }
                    }
                });

                chartRef.current = chart;

                // Volume Histogram Setup
                const volumeSeries = chart.addHistogramSeries({
                    priceFormat: { type: 'volume' },
                    priceScaleId: 'volume'
                });

                chart.priceScale('volume').applyOptions({
                    scaleMargins: { top: 0.7, bottom: 0 },
                    visible: false
                });
                volumeSeriesRef.current = volumeSeries;

                ema200Ref.current = chart.addLineSeries({ color: '#FFFFFF', lineWidth: 3, title: '', lastValueVisible: false, priceLineVisible: false });
                ema20Ref.current = chart.addLineSeries({ color: '#FFFF00', lineWidth: 3, title: '', lastValueVisible: false, priceLineVisible: false });
                stUpRef.current = chart.addLineSeries({ color: '#00E676', lineWidth: 3, title: '', lastValueVisible: false, priceLineVisible: false });
                stDownRef.current = chart.addLineSeries({ color: '#FF1744', lineWidth: 3, title: '', lastValueVisible: false, priceLineVisible: false });

                zonesRef.current = chart.addBaselineSeries({
                    baseValue: { type: 'price', price: Number(entryPrice) || 0 },
                    topFillColor1: 'rgba(255, 255, 255, 0.1)', topFillColor2: 'rgba(255, 255, 255, 0.05)',
                    bottomFillColor1: 'rgba(239, 68, 68, 0.1)', bottomFillColor2: 'rgba(239, 68, 68, 0.05)',
                    lineVisible: false, axisLabelVisible: false, priceLineVisible: false,
                });

                const candleSeries = chart.addCandlestickSeries({
                    upColor: '#ffffff', downColor: '#EF4444', borderVisible: true, borderColor: '#000000', wickUpColor: '#ffffff', wickDownColor: '#EF4444',
                    priceFormat: {
                        type: 'price',
                        precision: 6,
                        minMove: 0.000001
                    }
                });
                seriesRef.current = candleSeries;

                // Initial fetch
                fetchHistory();

                const handleResize = () => {
                    if (chartRef.current && chartContainerRef.current) {

        // Hook for Text-to-Speech (TTS) - V5.3.3 Enhanced for Mobile
        const useSpeechSynthesis = () => {
            const [isSpeaking, setIsSpeaking] = useState(false);
            const [voices, setVoices] = useState([]);
            const audioRef = useRef(null);

            // Load voices once
            useEffect(() => {
                const loadVoices = () => {
                    const availableVoices = window.speechSynthesis.getVoices();
                    if (availableVoices.length > 0) {
                        setVoices(availableVoices);
                    }
                };
                loadVoices();
                if (window.speechSynthesis.onvoiceschanged !== undefined) {
                    window.speechSynthesis.onvoiceschanged = loadVoices;
                }
            }, []);

            const speak = async (text) => {
                if (!text) return;

                // Stop any current speaking
                stop();
                setIsSpeaking(true);

                try {
                    // 1. Try Premium API (Antonio/Google)
                    const response = await fetch(`${API_BASE}/api/tts`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            text: text,
                            voice: 'pt-BR-AntonioNeural'
                        })
                    });

                    const data = await response.json();

                    if (data.audio) {
                        const audioBlob = new Blob(
                            [Uint8Array.from(atob(data.audio), c => c.charCodeAt(0))],
                            { type: 'audio/mp3' }
                        );
                        const audioUrl = URL.createObjectURL(audioBlob);

                        const audio = new Audio();
                        audio.src = audioUrl;
                        audioRef.current = audio;

                        audio.onended = () => {
                            setIsSpeaking(false);
                            URL.revokeObjectURL(audioUrl);
                        };
                        audio.onerror = () => {
                            console.warn("Audio element error, falling back...");
                            fallbackSpeak(text);
                        };

                        try {
                            await audio.play();
                            return; // SUCCESS
                        } catch (playErr) {
                            console.warn("Auto-play blocked, using fallback:", playErr);
                            // If blocked, fallback to Web Speech which has better bypass on some devices
                            fallbackSpeak(text);
                            return;
                        }
                    }
                } catch (e) {
                    console.log('Premium TTS unavailable:', e);
                }

                fallbackSpeak(text);
            };

            const fallbackSpeak = (text) => {
                if (!('speechSynthesis' in window)) {
                    setIsSpeaking(false);
                    return;
                }

                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'pt-BR';
                utterance.rate = 1.0;
                utterance.pitch = 1.0;

                const availableVoices = voices.length > 0 ? voices : window.speechSynthesis.getVoices();

                // V5.3.3: Extreme Male Voice search (Mobile prioritized)
                // Prioritize "Daniel" (iOS Male), then "Antonio" (Edge), then generic "Male"
                let maleVoice = availableVoices.find(v =>
                    v.lang.startsWith('pt') &&
                    (v.name.includes('Daniel') || v.name.includes('Antonio') || v.name.includes('Guilherme'))
                );

                if (!maleVoice) {
                    maleVoice = availableVoices.find(v =>
                        v.lang.startsWith('pt') &&
                        (v.name.toLowerCase().includes('male') || v.name.toLowerCase().includes('masculino'))
                    );
                }

                // Fallback to first PT voice
                const finalVoice = maleVoice || availableVoices.find(v => v.lang.startsWith('pt'));
                if (finalVoice) utterance.voice = finalVoice;

                utterance.onstart = () => setIsSpeaking(true);
                utterance.onend = () => setIsSpeaking(false);
                utterance.onerror = (err) => {
                    console.error("SpeechSynthesis Error:", err);
                    setIsSpeaking(false);

                window.speechSynthesis.speak(utterance);

                            const lastTs = (historyLogs.length > 0) ? historyLogs[historyLogs.length - 1].timestamp : null;

                        const res = await fetch(url);

            const activeSymbols = useMemo(() => {

            const tickers = useOkxTickers(activeSymbols);

            // [V24.2] Live Equity Calculation (Tactical + Vault)
            const liveTotalPnL = useMemo(() => {
                // Tactical Slots PnL
                const sPnL = slots.reduce((acc, s) => {
                    if (!s || !s.symbol) return acc;
                    const cleanSymbol = (s.symbol || '').replace('.P', '').replace('.p', '').trim();
                    const price = tickers[cleanSymbol];
                    const entry = Number(s.entry_price || 0);
                    const leverage = s.leverage || 50;
                    const margin = Number(s.entry_margin || s.margin || 10);

                    let pnlPct = 0;
                    if (price && price > 0 && entry > 0) {
                        pnlPct = s.side === 'Buy' || s.side === 'LONG'
                            ? (price - entry) / entry
                            : (entry - price) / entry;
                    } else {
                        // Fallback: s.pnl_percent já está alavancado em %. Dividimos por 100 e pela alavancagem para obter a variação nominal.
                        pnlPct = (Number(s.pnl_percent || 0) / 100) / leverage;
                    }

                    return acc + (pnlPct * leverage * margin);
                }, 0);

                // Moonbag Vault PnL
                const mPnL = moonbags.reduce((acc, mb) => {
                    if (!mb || !mb.symbol) return acc;
                    const cleanSymbol = (mb.symbol || '').replace('.P', '').replace('.p', '').trim();
                    const price = tickers[cleanSymbol];
                    const entry = Number(mb.entry_price || 0);
                    const leverage = mb.leverage || 50;
                    const margin = Number(mb.entry_margin || mb.margin || 10);

                    let pnlPct = 0;
                    if (price && price > 0 && entry > 0) {
                        pnlPct = mb.side === 'Buy' || mb.side === 'LONG'
                            ? (price - entry) / entry
                            : (entry - price) / entry;
                    } else {
                        pnlPct = (Number(mb.pnl_percent || 0) / 100) / leverage;
                    }

                    return acc + (pnlPct * leverage * margin);
                }, 0);

                return sPnL + mPnL;
            }, [slots, moonbags, tickers]);

            const liveCycleProfit = (vault.cycle_profit || 0) + liveTotalPnL;
            const liveTotalProfit = (banca.lucro_total_acumulado || 0) + liveTotalPnL;
            // [V110.705] Ajuste para modo REAL: evita dupla contagem do PnL flutuante já consolidado na OKX
            const isRealMode = banca.saldo_real_okx !== undefined && banca.saldo_real_okx > 0;
            const baseEquity = (banca.saldo_total != null && banca.saldo_total > 0) ? banca.saldo_total : ((banca.configured_balance > 0) ? banca.configured_balance : (banca.saldo_real_okx || 10));
            const liveEquity = isRealMode ? (banca.saldo_real_okx || banca.saldo_total) : (baseEquity + liveTotalPnL);

            // Map Best Signals
            const signalsArray = Array.isArray(radarSignals) ? radarSignals : [];
            const deDuplicatedSignals = Object.values(signalsArray.reduce((acc, sig) => {
                const sym = sig.symbol;

            }, {}));
            const currentActiveSymbols = slots.filter(s => s && s.symbol).map(s => s.symbol);
            const bestSignals = deDuplicatedSignals

                    // V25.1: SNIPER signals always on top, then by score
                    const aSniper = a.layer === 'SNIPER' ? 1 : 0;
                    const bSniper = b.layer === 'SNIPER' ? 1 : 0;

                    return b.score - a.score;

            const handlePanic = async () => {

            // [V110.370] Radar Intelligence & Slot Needs

                const filtered = bestSignals.filter(sig => {

                    return true; // Todos os sinais são Blitz agora

                return { intelligenceMessage: msg, filteredSignals: filtered };

            // [V110.641] UI Sanity Audit Hook

                                                        </span>
                                                        <div className="text-[7px] text-gray-600 uppercase font-black">{new Date(log.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>

                </main>

        };

        // [NEW] Librarian Leaderboard Component
        const LibrarianLeaderboard = () => {

                    if (data.status === 'success') {

                        // Store globally for other components to use

                } catch (e) { console.error("Erro Librarian:", e); }

            React.useEffect(() => {

                const itv = setInterval(fetchRankings, 300000); // 5 min

            return (
                <div className="glass-card p-6 rounded-3xl border border-white/5 flex flex-col gap-4 bg-white/[0.02]">
                    <div className="flex items-center justify-between border-b border-white/5 pb-3">

                    <div className="flex flex-col gap-2 max-h-[350px] overflow-y-auto no-scrollbar pr-1">

                        ) : rankings.length === 0 ? (

                        ) : rankings.map((r, i) => (

        };

        // =========================================================================
        // [V110.115] InteractiveBacktestChart — Motor Eagle Vision v110.41 PRO
        // =========================================================================
        const InteractiveBacktestChart = ({ klines, trades, ghostInsights, qualitySeal, dnaTags, equityCurve, srZones, height = 450 }) => {
            const chartContainerRef = React.useRef(null);
            const equityContainerRef = React.useRef(null);
            const chartRef = React.useRef(null);
            const equityChartRef = React.useRef(null);
            const [eagleMode, setEagleMode] = React.useState(true);

            React.useEffect(() => {
                if (!klines || klines.length === 0) return;

                // === MAIN CHART ===
                const chart = LightweightCharts.createChart(chartContainerRef.current, {
                    height: height,
                    layout: { background: { color: 'transparent' }, textColor: '#94a3b8', fontFamily: 'JetBrains Mono' },
                    grid: { vertLines: { color: 'rgba(255,255,255,0.03)' }, horzLines: { color: 'rgba(255,255,255,0.03)' } },
                    crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
                    priceScale: { borderColor: 'rgba(255,255,255,0.1)' },
                    timeScale: { borderColor: 'rgba(255,255,255,0.1)', timeVisible: true },
                });
                chartRef.current = chart;

                const candlestickSeries = chart.addCandlestickSeries({
                    upColor: '#22c55e', downColor: '#ef4444', borderVisible: false,
                    wickUpColor: '#22c55e', wickDownColor: '#ef4444'
                });
                candlestickSeries.setData(klines);

                // 2. Volume Series (Eagle Vision)
                if (eagleMode && window.calculateVolumes) {
                    const volumeSeries = chart.addHistogramSeries({ color: 'rgba(38, 166, 154, 0.5)', priceFormat: { type: 'volume' }, priceScaleId: '' });
                    volumeSeries.priceScale().applyOptions({ scaleMargins: { top: 0.8, bottom: 0 } });
                    volumeSeries.setData(window.calculateVolumes(klines));
                }

                // 3. Trade Markers
                if (trades && trades.length > 0) {
                    const markers = [];
                    trades.forEach(t => {
                        markers.push({
                            time: intTime(t.entry_time),
                            position: t.side === 'Long' ? 'belowBar' : 'aboveBar',
                            color: t.side === 'Long' ? '#22c55e' : '#f59e0b',
                            shape: t.side === 'Long' ? 'arrowUp' : 'arrowDown',
                            text: `${t.side} Entry`
                        });
                        if (t.exit_time) {
                            markers.push({
                                time: intTime(t.exit_time),
                                position: 'inBar',
                                color: (t.pnl || 0) >= 0 ? '#22c55e' : '#f43f5e',
                                shape: 'circle',
                                text: `EXIT ($${(t.pnl || 0).toFixed(1)})`
                            });
                        }
                    });
                    candlestickSeries.setMarkers(markers.sort((a,b) => a.time - b.time));
                }

                // === EQUITY CHART ===
                if (equityCurve && equityCurve.length > 0) {

        const NeuralChatPage = () => {

        // =========================================================================
        // SettingsPage — Rota /config (V110.115 + V2.0 OKX Real Credentials)
        // =========================================================================
        const SettingsPage = ({ onLogout, theme, setTheme }) => {
            const themes = [
                { id: 'classic', label: 'Classic Gold', icon: 'auto_awesome', color: 'text-yellow-400' },

            const [customApi, setCustomApi] = React.useState(localStorage.getItem('BACKEND_API_URL') || '');

            // ─── OKX Credentials State ─────────────────────────────────
            const [okxApiKey, setOkxApiKey]         = React.useState('');
            const [okxSecret, setOkxSecret]         = React.useState('');
            const [okxPassphrase, setOkxPassphrase] = React.useState('');
            const [showApiKey, setShowApiKey]         = React.useState(false);
            const [showSecret, setShowSecret]         = React.useState(false);
            const [showPassphrase, setShowPassphrase] = React.useState(false);
            const [okxStatus, setOkxStatus]         = React.useState(null);
            const [testResult, setTestResult]       = React.useState(null);
            const [testing, setTesting]             = React.useState(false);
            const [saving, setSaving]               = React.useState(false);
            const [testPassed, setTestPassed]       = React.useState(false);

            const authHeader = () => ({
                'Content-Type': 'application/json',
                // Tenta 'auth_token' primeiro (login novo), fallback 'sniper_token' (sistema legado)
                'Authorization': `Bearer ${localStorage.getItem('auth_token') || localStorage.getItem('sniper_token') || ''}`

            React.useEffect(() => {
                const fetchStatus = async () => {
                    try {
                        const res = await fetch(`${API_BASE}/api/account/okx-tokens/status`, { headers: authHeader() });
                        if (res.ok) setOkxStatus(await res.json());
                    } catch (e) { console.warn('[OKX] status fetch error:', e); }
                };
                fetchStatus();
            }, []);

            // ─── User Management State (Admins only) ───────────────────
            const [usersList, setUsersList] = React.useState([]);
            const [loadingUsers, setLoadingUsers] = React.useState(false);
            const [usersError, setUsersError] = React.useState('');

            const currentUser = React.useMemo(() => {
                try {
                    return JSON.parse(localStorage.getItem('user') || '{}');
                } catch (e) {
                    return {};
                }
            }, []);
            const isAdmin = currentUser.role === 'admin';

            const fetchUsers = async () => {
                if (!isAdmin) return;
                setLoadingUsers(true);
                setUsersError('');
                try {
                    const res = await fetch(`${API_BASE}/api/auth/users`, { headers: authHeader() });
                    if (res.ok) {
                        const data = await res.json();
                        setUsersList(data.users || []);
                    } else {
                        setUsersError('Erro ao carregar lista de usuários');
                    }
                } catch (e) {
                    setUsersError('Erro de rede ao carregar usuários: ' + e.message);
                } finally {
                    setLoadingUsers(false);
                }
            };

            React.useEffect(() => {
                if (isAdmin) {
                    fetchUsers();
                }

            const handleToggleUserStatus = async (userObj) => {
                const action = userObj.is_active ? 'block' : 'approve';
                try {
                    const res = await fetch(`${API_BASE}/api/auth/users/${userObj.id}/${action}`, {
                        method: 'POST',
                        headers: authHeader()
                    });
                    if (res.ok) {
                        fetchUsers();
                    } else {
                        const errData = await res.json();
                        alert(`Erro: ${errData.detail || errData.error || 'Falha ao alterar status'}`);
                    }
                } catch (e) {
                    alert('Erro de rede: ' + e.message);
                }
            };

            const handleDeleteUser = async (userId) => {
                if (!confirm('Deseja realmente excluir este usuário?')) return;
                try {
                    const res = await fetch(`${API_BASE}/api/auth/users/${userId}`, {
                        method: 'DELETE',
                        headers: authHeader()
                    });
                    if (res.ok) {
                        fetchUsers();
                    } else {
                        const errData = await res.json();
                        alert(`Erro: ${errData.detail || errData.error || 'Falha ao excluir'}`);
                    }

                    alert('Erro de rede: ' + e.message);
                }

            const handleTestOkx = async () => {
                if (!okxApiKey.trim() || !okxSecret.trim()) {
                    setTestResult({ success: false, message: 'Preencha a API Key e a Secret Key.' });
                    return;

                setTesting(true); setTestResult(null); setTestPassed(false);

                    const res = await fetch(`${API_BASE}/api/account/okx-tokens/test-live`, {
                        method: 'POST',
                        headers: authHeader(),
                        body: JSON.stringify({ api_key: okxApiKey.trim(), secret_key: okxSecret.trim(), passphrase: okxPassphrase.trim() || null })

                    const data = await res.json();
                    if (res.ok && data.success) { setTestResult({ success: true, ...data }); setTestPassed(true); }
                    else { setTestResult({ success: false, message: data.detail || data.message || 'Credenciais inválidas' }); }
                } catch (e) { setTestResult({ success: false, message: 'Erro de rede: ' + e.message }); }
                finally { setTesting(false); }
            };

            const handleSaveOkx = async () => {
                if (!testPassed) return;
                setSaving(true);

                    const res = await fetch(`${API_BASE}/api/account/okx-tokens`, {
                        method: 'POST',
                        headers: authHeader(),
                        body: JSON.stringify({ api_key: okxApiKey.trim(), secret_key: okxSecret.trim(), passphrase: okxPassphrase.trim() || null })

                                                    </div>
                                                    <span className="text-[10px] text-gray-500 font-mono">{u.email || 'Sem e-mail'}</span>
                                                </div>

                                                <div className="flex items-center gap-2 self-end sm:self-center">
                                                    {/* Status Badge */}
                                                    <span className={`text-[8px] font-black px-2 py-0.5 rounded-full uppercase tracking-widest ${
                                                        u.is_active 
                                                            ? 'bg-green-500/10 text-green-400 border border-green-500/20' 
                                                            : 'bg-yellow-500/10 text-yellow-400 border border-yellow-500/20'
                                                    }`}>
                                                        {u.is_active ? 'Aprovado' : 'Pendente/Bloqueado'}
                                                    </span>

                                                    {/* Toggle Button */}
                                                    <button 
                                                        onClick={() => handleToggleUserStatus(u)}
                                                        className={`px-3 py-1.5 rounded-lg text-[9px] font-black uppercase tracking-wider border transition-all ${
                                                            u.is_active 
                                                                ? 'bg-yellow-500/10 border-yellow-500/20 text-yellow-400 hover:bg-yellow-500/20 animate-triumph' 
                                                                : 'bg-green-500/10 border-green-500/20 text-green-400 hover:bg-green-500/20 animate-triumph'
                                                        }`}
                                                    >
                                                        {u.is_active ? 'Bloquear' : 'Aprovar'}
                                                    </button>

                                                    {/* Delete Button */}
                                                    <button 
                                                        onClick={() => handleDeleteUser(u.id)}
                                                        className="p-1.5 rounded-lg bg-red-500/10 border border-red-500/20 text-red-400 hover:bg-red-500/20 transition-all"
                                                        title="Excluir usuário"
                                                    >
                                                        <span className="material-icons-round text-xs">delete</span>
                                                    </button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}

                        {/* ════════ RESET DO SISTEMA (PAPER) — ADMINS ONLY ════════ */}
                        {isAdmin && (
                            <div className="glass-card p-5 rounded-2xl border border-red-500/15 flex flex-col gap-4 bg-red-950/5">
                                <h2 className="text-xs font-black text-red-400 uppercase tracking-widest flex items-center gap-2">
                                    <span className="material-icons-round text-sm">restart_alt</span>
                                    Resetar Motor Paper & Banca
                                </h2>
                                <p className="text-[10px] text-gray-400 leading-relaxed uppercase tracking-wider">
                                    Esta ação limpa todos os slots ativos (LIVRE), remove ordens Moonbag, limpa o histórico de trades e reinicia o saldo Paper do Sniper para o valor inicial de $20.00.
                                </p>
                                <button
                                    onClick={async () => {
                                        if (!confirm("⚠️ ATENÇÃO: Deseja realmente resetar todas as ordens, slots e a banca para $20.00? Esta ação não pode ser desfeita!")) return;
                                        try {
                                            const res = await fetch(`${API_BASE}/api/admin/reset-system`, {
                                                method: 'POST',
                                                headers: authHeader()
                                            });
                                            const data = await res.json();
                                            if (res.ok && data.status === 'SUCCESS') {
                                                alert(`✅ Sucesso:\n${data.message}`);
                                                window.location.reload();
                                            } else {
                                                alert(`❌ Erro: ${data.detail || data.message || 'Falha no reset'}`);
                                            }
                                        } catch (e) {
                                            alert('❌ Erro de rede: ' + e.message);
                                        }
                                    }}
                                    className="w-full py-3 rounded-xl bg-red-500/10 hover:bg-red-500/20 border border-red-500/25 hover:border-red-500/40 text-red-400 font-bold text-xs uppercase tracking-widest transition-all flex items-center justify-center gap-2 cursor-pointer"
                                >
                                    <span className="material-icons-round text-sm">settings_backup_restore</span>
                                    Resetar Completo (Banca $20.00)
                                </button>
                            </div>
                        )}

                        {/* Info do Sistema */}
                        <div className="glass-card p-5 rounded-2xl border border-white/5 flex flex-col gap-3">
                            <h2 className="text-xs font-black text-gray-400 uppercase tracking-widest flex items-center gap-2">
                                <span className="material-icons-round text-sm text-white/60">info</span>
                                Informações do Sistema
                            </h2>
                            <div className="flex flex-col gap-2 font-mono text-[10px]">
                                {[
                                    { label: 'Versão UI', value: 'V110.115 Sentinel Protocol' },
                                    { label: 'Endpoint', value: window.API_BASE || 'https://1crypten.space' },
                                    { label: 'Modo', value: 'COCKPIT · Single Source of Truth' },
                                    { label: 'Protocolo', value: 'Guardian Hedge + Escadinha Operacional' },
                                ].map((row, i) => (
                                    <div key={i} className="flex justify-between items-center py-2 border-b border-white/5 last:border-0">
                                        <span className="text-gray-500 uppercase tracking-wider">{row.label}</span>
                                        <span className="text-gray-300 font-bold text-right max-w-[60%] truncate">{row.value}</span>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* Logout */}
                        <button
                            onClick={onLogout}
                            className="flex items-center justify-center gap-2 w-full py-3 rounded-xl bg-red-500/10 text-red-400 border border-red-500/20 hover:bg-red-500/20 hover:border-red-500/40 transition-all font-bold text-xs uppercase tracking-widest"
                        >
                            <span className="material-icons-round text-sm">power_settings_new</span>
                            Sair / Resetar Sessão
                        </button>

                    </div>
                </div>
            );
        };

        // =========================================================================
        // AdminUsersPage — Rota /adm (Controle de Acesso de Usuários)
        // =========================================================================
        const AdminUsersPage = () => {
            const [usersList, setUsersList] = React.useState([]);
            const [loadingUsers, setLoadingUsers] = React.useState(false);
            const [usersError, setUsersError] = React.useState('');

            const authHeader = () => ({
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${localStorage.getItem('auth_token') || localStorage.getItem('sniper_token') || ''}`
            });

            const fetchUsers = async () => {
                setLoadingUsers(true);
                setUsersError('');
                try {
                    const res = await fetch(`${API_BASE}/api/auth/users`, { headers: authHeader() });
                    if (res.ok) {
                        const data = await res.json();
                        setUsersList(data.users || []);
                    } else {
                        setUsersError('Erro ao carregar lista de usuários');
                    }
                } catch (e) {
                    setUsersError('Erro de rede ao carregar usuários: ' + e.message);
                } finally {
                    setLoadingUsers(false);
                }
            };

            React.useEffect(() => {
                fetchUsers();
            }, []);

            const handleToggleUserStatus = async (userObj) => {
                const action = userObj.is_active ? 'block' : 'approve';
                try {
                    const res = await fetch(`${API_BASE}/api/auth/users/${userObj.id}/${action}`, {
                        method: 'POST',
                        headers: authHeader()
                    });
                    if (res.ok) {
                        fetchUsers();
                    } else {
                        const errData = await res.json();
                        alert(`Erro: ${errData.detail || errData.error || 'Falha ao alterar status'}`);
                    }
                } catch (e) {
                    alert('Erro de rede: ' + e.message);
                }
            };

            const handleDeleteUser = async (userId) => {
                if (!confirm('Deseja realmente excluir este usuário?')) return;
                try {
                    const res = await fetch(`${API_BASE}/api/auth/users/${userId}`, {
                        method: 'DELETE',
                        headers: authHeader()
                    });
                    if (res.ok) {
                        fetchUsers();
                    } else {
                        const errData = await res.json();
                        alert(`Erro: ${errData.detail || errData.error || 'Falha ao excluir'}`);
                    }
                } catch (e) {
                    alert('Erro de rede: ' + e.message);
                }
            };

            return (
                <div className="min-h-screen v5-bg-deep text-white lg:pl-[80px] overflow-y-auto">
                    <div className="max-w-2xl mx-auto w-full px-4 sm:px-6 pb-[90px] lg:pb-10 flex flex-col gap-6 pt-8 lg:pt-12">
                        {/* Header */}
                        <div className="flex items-center gap-3 pb-4 border-b border-white/5">
                            <div className="w-10 h-10 rounded-xl bg-primary/10 border border-primary/20 flex items-center justify-center">
                                <span className="material-icons-round text-white">admin_panel_settings</span>
                            </div>
                            <div>
                                <h1 className="text-base font-black text-white uppercase tracking-widest">Controle de Usuários</h1>
                                <p className="text-[10px] text-gray-500 uppercase tracking-wider">Painel Administrativo 1Crypten</p>
                            </div>
                        </div>

                        <div className="glass-card p-5 rounded-2xl border border-white/5 flex flex-col gap-4">
                            <div className="flex items-center justify-between pb-3 border-b border-white/5">
                                <h2 className="text-xs font-black text-gray-400 uppercase tracking-widest flex items-center gap-2">
                                    <span className="material-icons-round text-sm text-cyan-400">group</span>
                                    Usuários Cadastrados
                                </h2>
                                <button onClick={fetchUsers} disabled={loadingUsers} className="text-gray-500 hover:text-white transition-colors">
                                    <span className={`material-icons-round text-sm ${loadingUsers ? 'animate-spin' : ''}`}>refresh</span>
                                </button>
                            </div>

                            {usersError && (
                                <p className="text-[10px] text-red-500 font-bold uppercase tracking-widest">{usersError}</p>
                            )}

                            {loadingUsers && usersList.length === 0 ? (
                                <div className="py-4 text-center text-xs text-gray-600 uppercase tracking-widest animate-pulse">Carregando usuários...</div>
                            ) : usersList.length === 0 ? (
                                <div className="py-4 text-center text-xs text-gray-600 uppercase tracking-widest">Nenhum outro usuário cadastrado</div>
                            ) : (
                                <div className="flex flex-col gap-3">
                                    {usersList.map(u => (
                                        <div key={u.id} className="flex flex-col sm:flex-row sm:items-center justify-between p-3 rounded-xl border border-white/5 bg-white/[0.01] hover:bg-white/[0.02] gap-3 transition-all">
                                            <div className="flex flex-col gap-1">
                                                <div className="flex items-center gap-2">
                                                    <span className="text-[10px] font-black text-white font-mono leading-none">ID #{u.id}</span>
                                                    <span className="text-xs font-bold text-white font-mono leading-none">{u.username}</span>
                                                    <span className={`text-[8px] font-black px-1.5 py-0.5 rounded uppercase tracking-wider ${
                                                        u.role === 'admin' ? 'bg-primary/20 text-primary border border-primary/20' : 'bg-white/5 text-gray-400 border border-white/5'
                                                    }`}>{u.role}</span>
                                                </div>
                                                <span className="text-[10px] text-gray-500 font-mono">{u.email || 'Sem e-mail'}</span>
                                            </div>

                                            <div className="flex items-center gap-2 self-end sm:self-center">
                                                {/* Status Badge */}
                                                <span className={`text-[8px] font-black px-2 py-0.5 rounded-full uppercase tracking-widest ${
                                                    u.is_active 
                                                        ? 'bg-green-500/10 text-green-400 border border-green-500/20' 
                                                        : 'bg-yellow-500/10 text-yellow-400 border border-yellow-500/20'
                                                }`}>
                                                    {u.is_active ? 'Aprovado' : 'Pendente/Bloqueado'}
                                                </span>

                                                {/* Toggle Button */}
                                                <button 
                                                    onClick={() => handleToggleUserStatus(u)}
                                                    className={`px-3 py-1.5 rounded-lg text-[9px] font-black uppercase tracking-wider border transition-all ${
                                                        u.is_active 
                                                            ? 'bg-yellow-500/10 border-yellow-500/20 text-yellow-400 hover:bg-yellow-500/20 animate-triumph' 
                                                            : 'bg-green-500/10 border-green-500/20 text-green-400 hover:bg-green-500/20 animate-triumph'
                                                    }`}
                                                >
                                                    {u.is_active ? 'Bloquear' : 'Aprovar'}
                                                </button>

                                                {/* Delete Button */}
                                                <button 
                                                    onClick={() => handleDeleteUser(u.id)}
                                                    className="p-1.5 rounded-lg bg-red-500/10 border border-red-500/20 text-red-400 hover:bg-red-500/20 transition-all"
                                                    title="Excluir usuário"
                                                >
                                                    <span className="material-icons-round text-xs">delete</span>
                                                </button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [isAuthenticated, setIsAuthenticated] = useState(() => {
                return !!(localStorage.getItem('auth_token') || localStorage.getItem('sniper_token'));
            });
            const [theme, setTheme] = useState(() => {
                const saved = localStorage.getItem('v5_theme');
                return saved && saved !== 'classic' ? saved : 'gemini';
            });
            const [selectedAnalysisSymbol, setSelectedAnalysisSymbol] = useState(null);
            const [hermesNotifications, setHermesNotifications] = useState([]);
            const [hermesCompliance, setHermesCompliance] = useState(null);

            useEffect(() => {
                window.openDeepAnalysis = (sym) => setSelectedAnalysisSymbol(sym);
            }, []);

            useEffect(() => {
                localStorage.setItem('v5_theme', theme);
            }, [theme]);

            // [HERMES] Notification event listeners
            let hermesNotifCounter = 0;
            useEffect(() => {
                const handleNotif = (e) => {
                    const notifId = ++hermesNotifCounter;
                    setHermesNotifications(prev => {
                        const next = [...prev, { ...e.detail, id: notifId, timestamp: new Date().toISOString() }];
                        if (next.length > 10) next.shift();
                        return next;
                    });
                    setTimeout(() => {
                        setHermesNotifications(prev => prev.filter(n => n.id !== notifId));
                    }, 8000);
                };
                const handleCompliance = (e) => {
                    setHermesCompliance(e.detail);
                };
                window.addEventListener('hermes-notification', handleNotif);
                window.addEventListener('hermes-compliance', handleCompliance);
                return () => {
                    window.removeEventListener('hermes-notification', handleNotif);
                    window.removeEventListener('hermes-compliance', handleCompliance);
                };
            }, []);

            useEffect(() => {
                const shield = document.getElementById('boot-shield');
                if (shield) {
                    // V110.171: Manter a tela de boot visível para a animação "Neural Interface"
                    setTimeout(() => {
                        shield.style.opacity = '0';
                        setTimeout(() => {
                            shield.style.display = 'none';
                            shield.remove();
                        }, 1200); // 1.2s fade out
                    }, 3500); // 3.5s tempo total de exibição
                }
            }, []);

            // [V110.150] PWA Registration & Update Protocol
            const [showUpdate, setShowUpdate] = useState(false);
            const [waitingWorker, setWaitingWorker] = useState(null);

            useEffect(() => {
                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.register('/sw.js?v=110.900').then(reg => {
                        // Detect updates
                        reg.addEventListener('updatefound', () => {
                            const newWorker = reg.installing;
                            newWorker.addEventListener('statechange', () => {
                                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    setWaitingWorker(newWorker);
                                    setShowUpdate(true);
                                }
                            });
                        });
                    });


                }
            }, []);

            const updateApp = () => {
                if (waitingWorker) {
                    waitingWorker.postMessage({ type: 'SKIP_WAITING' });
                }
                setShowUpdate(false);
            };

            const handleLogout = () => {
                localStorage.removeItem('auth_token');
                localStorage.removeItem('sniper_token');
                localStorage.removeItem('refresh_token');
                localStorage.removeItem('user');
                setIsAuthenticated(false);
            };

            const handleAuthSuccess = () => {
                setIsAuthenticated(true);
            };

            if (!isAuthenticated) {
                window.location.replace('/login');
                return null;
            }

            return (
                <ReactRouterDOM.HashRouter>
                    <div className={`h-full ${theme === 'gemini' ? 'theme-gemini' : 'theme-classic'}`}>
                        <ReactRouterDOM.Routes>
                            <Route path="/" element={<Page10D />} />
                            <Route path="/10d" element={<Page10D />} />
                            <Route path="/neural-chat" element={<div className="w-full h-full lg:pl-[80px] pb-[70px] lg:pb-0 overflow-hidden"><iframe src="/neural-chat.html" className="w-full h-full border-none" title="Neural Chat Interface" /></div>} />
                            <Route path="/kanban" element={<div className="w-full h-full lg:pl-[80px] pb-[70px] lg:pb-0 overflow-hidden"><iframe src="/kanban-hermes.html" className="w-full h-full border-none" title="Hermes Kanban" /></div>} />
                            <Route path="/config" element={<SettingsPage onLogout={handleLogout} theme={theme} setTheme={setTheme} />} />
                            <Route path="/adm" element={<AdminUsersPage />} />
                        </ReactRouterDOM.Routes>
                        <NavBar onLogout={handleLogout} />
                    </div>
                    
                    {/* [V110.182.9] PWA Update Toast */}
                    {showUpdate && (
                        <div className="fixed bottom-24 left-4 right-4 z-[100] animate-bounce">
                            <div className="glass border border-primary/40 p-4 rounded-2xl flex items-center justify-between shadow-2xl">
                                <div className="flex items-center gap-3">
                                    <div className="w-8 h-8 rounded-full bg-primary/20 flex items-center justify-center">
                                        <span className="material-icons-round text-white text-sm">system_update</span>
                                    </div>
                                    <div>
                                        <h4 className="text-xs font-black text-white uppercase">Update Sniper V110.900</h4>
                                        <p className="text-[9px] text-gray-400 font-bold uppercase">Novas inteligências detectadas!</p>
                                    </div>
                                </div>
                                <button 
                                    onClick={updateApp}
                                    className="bg-primary text-black text-[10px] font-black px-4 py-2 rounded-xl uppercase tracking-tighter"
                                >
                                    Atualizar Agora
                                </button>
                            </div>
                        </div>
                    )}

                    {/* [HERMES] Notification Toasts */}
                    {hermesNotifications.length > 0 && hermesNotifications.map((notif, i) => (
                        <div key={notif.id} className="fixed bottom-36 left-4 right-4 z-[110] transition-all duration-500 pointer-events-none"
                             style={{ transform: `translateY(-${i * 80}px)`, opacity: 1 }}>
                            <div className={"glass border rounded-2xl p-4 flex items-start gap-3 shadow-2xl pointer-events-auto " +
                                (notif.severity === 'CRITICAL' ? 'border-red-500/50' :
                                 notif.severity === 'WARNING' ? 'border-amber-500/50' : 'border-green-500/30')}>
                                <div className={"w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0 " +
                                    (notif.severity === 'CRITICAL' ? 'bg-red-500/20' :
                                     notif.severity === 'WARNING' ? 'bg-amber-500/20' : 'bg-green-500/20')}>
                                    <span className="material-icons-round text-sm">
                                        {notif.severity === 'CRITICAL' ? 'error' :
                                         notif.severity === 'WARNING' ? 'warning' : 'check_circle'}
                                    </span>
                                </div>
                                <div className="flex-1 min-w-0">
                                    <h4 className="text-[10px] font-black text-white uppercase tracking-wider">{notif.title || 'HERMES'}</h4>
                                    <p className="text-[9px] text-gray-400 mt-0.5 leading-relaxed">{notif.message}</p>
                                </div>
                                <button onClick={() => setHermesNotifications(prev => prev.filter(n => n.id !== notif.id))}
                                        className="w-6 h-6 rounded-full bg-white/5 hover:bg-white/10 flex items-center justify-center flex-shrink-0 pointer-events-auto">
                                    <span className="material-icons-round text-[10px] text-gray-500">close</span>
                                </button>
                            </div>
                        </div>
                    ))}

                    <DeepAnalysisModal 
                        symbol={selectedAnalysisSymbol} 
                        onClose={() => setSelectedAnalysisSymbol(null)} 
                    />
                </ReactRouterDOM.HashRouter>
            );
        };

        const startApp = () => {
            try {
                // [SILENCED] DIAGNOSTIC: Attempting React Mount
                const rootEl = document.getElementById('root');
                if (!rootEl) {
                    console.warn("DIAGNOSTIC: Root not found, retrying in 500ms...");
                    setTimeout(startApp, 500);
                    return;
                }
                
                const root = createRoot(rootEl);
                root.render(<App />);
                // [SILENCED] DIAGNOSTIC: React Render called
            } catch (err) {
                console.error("DIAGNOSTIC: MOUNT FAILURE:", err);
                const status = document.getElementById('boot-status');
                if (status) status.innerText = "CRITICAL BOOT ERROR: See Console";
            }
        };

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', startApp);
        } else {
            startApp();
        }

    </script>
</body>
</html>
