<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System 10D</title>
    <link rel="icon" type="image/png" href="logo10DTrasp.png?v=4">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000000;
            color: #ffffff;
            font-family: 'Outfit', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Estrelas sutis ao fundo */
        .stars-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image:
                radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.05), transparent),
                radial-gradient(1px 1px at 60% 70%, rgba(255,255,255,0.03), transparent),
                radial-gradient(2px 2px at 80% 20%, rgba(255,255,255,0.03), transparent);
            background-size: 250px 250px;
            z-index: 0;
            pointer-events: none;
        }

        .logo-container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            text-align: center;
        }

        .logo-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 180px;
            height: 180px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 50%;
            filter: blur(40px);
            z-index: 1;
            animation: pulse-glow 2.5s ease-in-out infinite;
        }

        .logo-img {
            width: 120px;
            height: 120px;
            position: relative;
            z-index: 2;
            animation: pulse-scale 2.5s ease-in-out infinite;
        }

        .status-text {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 0.3em;
            animation: fade-pulse 2.5s ease-in-out infinite;
        }

        @keyframes pulse-scale {
            0%, 100% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.15)); }
        }

        @keyframes pulse-glow {
            0%, 100% { width: 150px; height: 150px; opacity: 0.5; }
            50% { width: 220px; height: 220px; opacity: 1; }
        }

        @keyframes fade-pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }
    </style>
    <script>
        // Limpeza imediata de todos os Service Workers e Cache Storage
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(registrations => {
                for (let registration of registrations) {
                    registration.unregister();
                }
            }).catch(err => console.error('Erro ao limpar SW:', err));
        }
        if (window.caches) {
            caches.keys().then(keys => {
                keys.forEach(key => caches.delete(key));
            }).catch(err => console.error('Erro ao limpar Caches:', err));
        }

        // Aguarda 3 segundos exibindo a animação completa antes de ir para a caixa de login (com cache buster)
        setTimeout(() => {
            window.location.replace('/login?t=' + Date.now());
        }, 3000);
    </script>
</head>
<body>
    <div class="stars-bg"></div>
    <div class="logo-container">
        <div style="position: relative;">
            <div class="logo-glow"></div>
            <img src="logo10DTrasp.png?v=4" class="logo-img" alt="System 10D Logo" onerror="this.style.display='none'; this.parentElement.innerHTML='<div style=\'width: 120px; height: 120px; border: 1px solid rgba(255,255,255,0.1); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:40px; font-weight:900;\'>1C</div>'">
        </div>
        <div class="status-text">Inicializando Secure Core...</div>
    </div>
</body>
</html>
