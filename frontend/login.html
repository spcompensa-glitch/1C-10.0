<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>System 10D — Autenticação</title>
    <link rel="icon" type="image/png" href="logo10DTrasp.png?v=4">
    <meta name="theme-color" content="#000000">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000000;
            color: #ffffff;
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Estrelas sutis ao fundo (opacidade baixa para não poluir) */
        .stars-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image:
                radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.08), transparent),
                radial-gradient(1px 1px at 60% 70%, rgba(255,255,255,0.05), transparent),
                radial-gradient(2px 2px at 80% 20%, rgba(255,255,255,0.04), transparent);
            background-size: 250px 250px;
            z-index: 0;
            pointer-events: none;
        }

        .glass-card {
            background: rgba(10, 10, 11, 0.4);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }

        .input-dark {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            font-family: 'JetBrains Mono', monospace;
            transition: all 0.3s ease;
        }

        .input-dark:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.08);
        }

        .input-dark::placeholder {
            color: #374151; /* text-gray-700 */
            letter-spacing: 0.15em;
        }
    </style>
</head>
<body>
    <div class="stars-bg"></div>

    <div class="w-full max-w-sm glass-card border border-white/10 p-8 rounded-[2rem] relative z-10 shadow-2xl mx-4">
        <div class="flex flex-col items-center gap-6">
            <!-- Logo com brilho sutil -->
            <div class="relative">
                <div class="absolute -inset-4 bg-white/5 rounded-full blur-2xl animate-pulse"></div>
                <img src="logo10DTrasp.png?v=4" class="w-20 h-20 relative z-10" alt="1C Logo" onerror="this.style.display='none'; this.parentElement.innerHTML='<div class=\'w-20 h-20 relative z-10 flex items-center justify-center border border-white/10 rounded-full text-white text-3xl font-black bg-white/5\'>1C</div>'">
            </div>

            <!-- Título -->
            <div class="text-center space-y-1">
                <h1 class="text-lg font-black text-white uppercase tracking-[0.3em]" id="panel-title">System 10D</h1>
            </div>

            <!-- Mensagens de Feedback -->
            <div id="message-container" class="w-full text-center hidden">
                <p id="message-text" class="text-[9px] font-black uppercase tracking-tighter py-2 px-3 rounded-xl"></p>
            </div>

            <!-- Formulário de Login (Completamente fiel ao print) -->
            <form id="login-form" class="w-full space-y-6">
                <div class="space-y-2">
                    <div class="relative">
                        <span class="material-icons-round absolute left-4 top-1/2 -translate-y-1/2 text-gray-600">vpn_key</span>
                        <input 
                            type="password" 
                            id="login-password"
                            placeholder="CHAVE DE ACESSO"
                            required
                            autocomplete="current-password"
                            class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 pl-12 pr-4 text-white text-sm font-mono placeholder:text-gray-700 focus:outline-none focus:border-white/30 transition-all text-center"
                        />
                    </div>
                </div>

                <button 
                    type="submit"
                    id="btn-login-submit"
                    class="w-full bg-white text-black py-4 rounded-2xl font-black text-xs uppercase tracking-[0.2em] hover:bg-gray-200 transition-all active:scale-[0.98]"
                >
                    ENTRAR
                </button>

                <div class="text-center mt-4">
                    <button
                        type="button"
                        onclick="showRegisterState()"
                        class="text-[10px] text-gray-400 hover:text-gray-300 transition-colors"
                    >
                        Solicitar Acesso →
                    </button>
                </div>
            </form>

            <!-- Formulário de Cadastro (Inicialmente oculto) -->
            <form id="register-form" class="w-full space-y-6 hidden">
                <div class="space-y-4">
                    <div class="relative">
                        <span class="material-icons-round absolute left-4 top-1/2 -translate-y-1/2 text-gray-600 text-base">person</span>
                        <input 
                            type="text" 
                            id="register-username"
                            placeholder="NOVO USUÁRIO"
                            required
                            autocomplete="username"
                            class="w-full input-dark rounded-2xl py-4 pl-12 pr-4 text-xs text-center uppercase"
                        />
                    </div>
                    <div class="relative">
                        <span class="material-icons-round absolute left-4 top-1/2 -translate-y-1/2 text-gray-600 text-base">email</span>
                        <input 
                            type="email" 
                            id="register-email"
                            placeholder="EMAIL (OPCIONAL)"
                            autocomplete="email"
                            class="w-full input-dark rounded-2xl py-4 pl-12 pr-4 text-xs text-center uppercase"
                        />
                    </div>
                    <div class="relative">
                        <span class="material-icons-round absolute left-4 top-1/2 -translate-y-1/2 text-gray-600 text-base">vpn_key</span>
                        <input 
                            type="password" 
                            id="register-password"
                            placeholder="SENHA"
                            required
                            autocomplete="new-password"
                            class="w-full input-dark rounded-2xl py-4 pl-12 pr-4 text-xs text-center"
                        />
                    </div>
                    <div class="relative">
                        <span class="material-icons-round absolute left-4 top-1/2 -translate-y-1/2 text-gray-600 text-base">lock</span>
                        <input 
                            type="password" 
                            id="register-confirm-password"
                            placeholder="CONFIRMAR SENHA"
                            required
                            autocomplete="new-password"
                            class="w-full input-dark rounded-2xl py-4 pl-12 pr-4 text-xs text-center"
                        />
                    </div>
                </div>

                <button 
                    type="submit"
                    id="btn-register-submit"
                    class="w-full bg-white text-black py-4 rounded-2xl font-black text-xs uppercase tracking-[0.2em] hover:bg-gray-200 transition-all active:scale-[0.98]"
                >
                    SOLICITAR ACESSO
                </button>

                <div class="text-center mt-4">
                    <button
                        type="button"
                        onclick="showLoginState()"
                        class="text-[10px] text-gray-400 hover:text-gray-300 transition-colors"
                    >
                        ← Voltar para o Login
                    </button>
                </div>
            </form>
        </div>

        <!-- Footer Secured by GuardianAgent -->
        <div class="mt-8 flex justify-center">
            <div class="flex items-center gap-2 text-[8px] text-gray-600 font-black uppercase tracking-[0.15em]">
                <span class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></span>
                Interface Secured by GuardianAgent
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;

        const loginForm = document.getElementById('login-form');
        const registerForm = document.getElementById('register-form');
        const messageContainer = document.getElementById('message-container');
        const messageText = document.getElementById('message-text');
        const btnLoginSubmit = document.getElementById('btn-login-submit');
        const btnRegisterSubmit = document.getElementById('btn-register-submit');

        function showMessage(text, isError = false) {
            messageContainer.classList.remove('hidden');
            messageText.textContent = text;
            if (isError) {
                messageText.className = "text-[9px] font-black uppercase text-center tracking-tighter text-red-500 bg-red-950/20 border border-red-500/10 py-2 px-3 rounded-xl";
            } else {
                messageText.className = "text-[9px] font-black uppercase text-center tracking-tighter text-green-500 bg-green-950/20 border border-green-500/10 py-2 px-3 rounded-xl";
            }
        }

        function clearMessage() {
            messageContainer.classList.add('hidden');
            messageText.textContent = '';
        }

        function showRegisterState() {
            clearMessage();
            loginForm.classList.add('hidden');
            registerForm.classList.remove('hidden');
        }

        function showLoginState() {
            clearMessage();
            registerForm.classList.add('hidden');
            loginForm.classList.remove('hidden');
        }

        // Garante a exposição global das funções para o onclick do HTML
        window.showRegisterState = showRegisterState;
        window.showLoginState = showLoginState;

        // Login Handler
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = 'admin';
            const password = document.getElementById('login-password').value;

            btnLoginSubmit.disabled = true;
            btnLoginSubmit.textContent = 'SINCRONIZANDO...';
            clearMessage();

            try {
                const response = await fetch(`${API_BASE}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok && data.access_token) {
                    localStorage.setItem('auth_token', data.access_token);
                    localStorage.setItem('sniper_token', data.access_token);
                    localStorage.setItem('refresh_token', data.refresh_token);
                    localStorage.setItem('user', JSON.stringify(data.user));

                    showMessage('ACESSO CONCEDIDO! REDIRECIONANDO...');
                    setTimeout(() => {
                        window.location.href = '/cockpit';
                    }, 1000);
                } else {
                    showMessage(data.detail || 'FALHA NA AUTENTICAÇÃO', true);
                    btnLoginSubmit.disabled = false;
                    btnLoginSubmit.textContent = 'ENTRAR';
                }
            } catch (error) {
                console.error('Login error:', error);
                showMessage('ERRO DE CONEXÃO COM O SERVIDOR', true);
                btnLoginSubmit.disabled = false;
                btnLoginSubmit.textContent = 'ENTRAR';
            }
        });

        // Register Handler
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('register-username').value;
            const email = document.getElementById('register-email').value;
            const password = document.getElementById('register-password').value;
            const confirmPassword = document.getElementById('register-confirm-password').value;

            if (password !== confirmPassword) {
                showMessage('AS SENHAS NÃO COINCIDEM', true);
                return;
            }
            if (password.length < 8) {
                showMessage('A SENHA DEVE TER NO MÍNIMO 8 CARACTERES', true);
                return;
            }

            btnRegisterSubmit.disabled = true;
            btnRegisterSubmit.textContent = 'PROCESSANDO...';
            clearMessage();

            try {
                const response = await fetch(`${API_BASE}/api/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        username, 
                        email, 
                        password, 
                        confirm_password: confirmPassword 
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage('CONTA CRIADA! AGUARDANDO LIBERAÇÃO DO ADM');
                    setTimeout(() => {
                        showLoginState();
                        btnRegisterSubmit.disabled = false;
                        btnRegisterSubmit.textContent = 'SOLICITAR ACESSO';
                    }, 3500);
                } else {
                    showMessage(data.detail || 'FALHA AO SOLICITAR ACESSO', true);
                    btnRegisterSubmit.disabled = false;
                    btnRegisterSubmit.textContent = 'SOLICITAR ACESSO';
                }
            } catch (error) {
                console.error('Register error:', error);
                showMessage('ERRO DE CONEXÃO COM O SERVIDOR', true);
                btnRegisterSubmit.disabled = false;
                btnRegisterSubmit.textContent = 'SOLICITAR ACESSO';
            }
        });

        // Auto-redirecionamento inteligente
        document.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('auth_token') || localStorage.getItem('sniper_token');
            if (token) {
                try {
                    const response = await fetch(`${API_BASE}/api/auth/me`, {
                        method: 'GET',
                        headers: {
                            'Authorization': `Bearer ${token}`
                        }
                    });
                    if (response.ok) {
                        window.location.href = '/cockpit';
                        return;
                    }
                } catch (err) {
                    console.error('Erro ao validar token:', err);
                }
                localStorage.removeItem('auth_token');
                localStorage.removeItem('sniper_token');
                localStorage.removeItem('user');
            }
        });
    </script>
</body>
</html>
