        // [V110.380] SILENCE PROTOCOL 2.0: Suppress redundant production warnings early
        (function() {
            const originalWarn = console.warn;
            const originalError = console.error;
            const silencePatterns = [
                "cdn.tailwindcss.com",
                "in-browser Babel transformer",
                "Vision Proof asset not ready",
                "Source map error",
                "DevTools failed to load source map",
                "Babel script"
            ];

            const silenceInterceptor = function(originalFunc) {
                return function(...args) {
                    const msg = (args[0] || "").toString();
                    if (silencePatterns.some(p => msg.includes(p))) return;
                    originalFunc.apply(console, args);
                };
            };

            console.warn = silenceInterceptor(originalWarn);
            console.error = silenceInterceptor(originalError);
        })();
    </script>

        // --- V56.0: Global Intelligence UI Helpers ---
        const getGaugeColor = (score) => {

        // =========================================================================
        // --- [INDICATOR UTILITIES] ---
        // =========================================================================
        const calculateSMA = (data, period) => {
            if (!data || data.length < period) return [];
            let smas = [];
            for (let i = 0; i < data.length; i++) {
                if (i < period - 1) {
                    smas.push(null);
                    continue;
                }
                let sum = 0;
                for (let j = 0; j < period; j++) {
                    sum += data[i - j].close;
                }
                smas.push({ time: data[i].time, value: sum / period });
            }
            return smas;
        };

        const calculateATR = (data, period) => {
            if (!data || data.length < period) return [];
            let trs = [];
            for (let i = 0; i < data.length; i++) {
                const candle = data[i];
                const prevCandle = data[i - 1];
                let tr;
                if (!prevCandle) {
                    tr = candle.high - candle.low;
                } else {
                    tr = Math.max(
                        candle.high - candle.low,
                        Math.abs(candle.high - prevCandle.close),
                        Math.abs(candle.low - prevCandle.close)
                    );
                }
                trs.push(tr);
            }

            let atrs = [];
            let sum = 0;
            for (let i = 0; i < data.length; i++) {
                if (i < period) {
                    sum += trs[i];
                    if (i === period - 1) atrs.push({ time: data[i].time, value: sum / period });
                    else atrs.push(null);
                    continue;
                }
                atrs.push({ time: data[i].time, value: (atrs[i - 1].value * (period - 1) + trs[i]) / period });
            }
            return atrs;
        };

        const calculateSuperTrend = (data, period, multiplier) => {
            const atrs = calculateATR(data, period);
            if (atrs.length === 0) return [];
            let st = [];
            let prevUpper = null;
            let prevLower = null;
            let trend = 1; 
            for (let i = 0; i < data.length; i++) {
                if (!atrs[i]) { st.push(null); continue; }
                const atr = atrs[i].value;
                const src = (data[i].high + data[i].low) / 2;
                let upper = src + multiplier * atr;
                let lower = src - multiplier * atr;
                if (prevUpper !== null) {
                    upper = (upper < prevUpper || data[i - 1].close > prevUpper) ? upper : prevUpper;
                    lower = (lower > prevLower || data[i - 1].close < prevLower) ? lower : prevLower;
                }
                if (i > 0 && st[i-1]) {
                    if (trend === 1 && data[i].close < lower) trend = -1;
                    else if (trend === -1 && data[i].close > upper) trend = 1;
                }
                const value = trend === 1 ? lower : upper;
                st.push({ time: data[i].time, value, color: trend === 1 ? '#ffffff' : '#EF4444' });
                prevUpper = upper; prevLower = lower;
            }
            return st;
        };

        const calculateBollingerBands = (data, period, stdDevMult) => {
            const smas = calculateSMA(data, period);
            if (smas.length === 0) return { upper: [], middle: [], lower: [] };
            
            let upper = [], middle = [], lower = [];
            for (let i = 0; i < data.length; i++) {
                if (i < period - 1) {
                    const t = data[i].time;
                    upper.push({ time: t, value: null });
                    middle.push({ time: t, value: null });
                    lower.push({ time: t, value: null });
                    continue;
                }
                
                let sumSq = 0;
                const mean = smas[i].value;
                for (let j = 0; j < period; j++) {
                    sumSq += Math.pow(data[i - j].close - mean, 2);
                }
                const stdDev = Math.sqrt(sumSq / period);
                const t = data[i].time;
                
                upper.push({ time: t, value: mean + stdDevMult * stdDev });
                middle.push({ time: t, value: mean });
                lower.push({ time: t, value: mean - stdDevMult * stdDev });
            }
            return { upper, middle, lower };
        };

            return {
                p, s1: (2 * p) - prev.high, s2: p - (prev.high - prev.low), s3: prev.low - 2 * (prev.high - p),

                         type === 'pivo' ? '#a855f7' : // Purple

            const renderIconContent = () => {
                const activeFilter = isLit ? `drop-shadow(0 0 8px ${color === '#ffffff' ? 'rgba(255,255,255,0.4)' : color + '80'})` : 'none';
                
                if (isEmoji || icon === 'waves') {

                        ? { filter: `drop-shadow(0 0 8px ${color}80)`, opacity: 1, transform: 'scale(1.1)' } 
                        : { filter: 'grayscale(100%)', opacity: 0.15, transform: 'scale(1)' };
                    
                    return <span className="text-[14px] transition-all duration-500" style={emojiStyle}>{icon === 'waves' ? '🐋' : icon}</span>;

                    <span

                            </span>
                            <span className="material-icons-round text-[8px] text-gray-600">
                                {data.trend === 'bullish' ? 'trending_up' : data.trend === 'bearish' ? 'trending_down' : 'trending_flat'}
                            </span>
                            <span className={`text-[7px] font-black font-mono flex items-center gap-0.5 ${getAdxStyle(data.adx)}`}>
                                {getAdxIcon(data.adx)} {Math.round(data.adx || 0)}
                            </span>
                        </div>
                    </div>

                    {/* V15.1: Reasoning Display */}
                    {!isBlocked && data.reasoning && (
                        <div className="mt-2 pt-2 border-t border-white/5 w-full">
                            <p className="text-[8px] text-gray-400 italic line-clamp-2 leading-tight text-center">
                                "{data.reasoning.replace(/\|/g, '•')}"
                            </p>
                        </div>
                    )}

                    {isBlocked && (
                        <div className="absolute inset-0 flex items-center justify-center bg-black/40 backdrop-blur-[1px]">
                            <span className="material-icons-round text-[12px] text-red-500/60">lock</span>
                        </div>
                    )}

                    {isElite && !isBlocked && (
                        <div className="absolute top-0 right-0 p-0.5">
                            <span className="flex h-1.5 w-1.5 rounded-full bg-amber-500 shadow-[0_0_5px_rgba(245,158,11,1)]"></span>
                        </div>
                    )}
                </div>
            );
        };

        const TradingChart = ({ symbol, entryPrice, stopLossPrice, targetPrice, side, pnlFallback, slotId, slotType }) => {
            const chartContainerRef = useRef();
            const chartRef = useRef();
            const seriesRef = useRef();
            const linesRef = useRef([]);
            const [lastPrice, setLastPrice] = useState(null);
            const [tf, setTf] = useState('15'); // Default 15m
            const isMounted = useRef(true);

            // V9.0 Trend Data State
            const [trendData, setTrendData] = useState({ trend: 'sideways', pattern: 'none', trend_strength: 0 });

            // V9.0 Trend Fetch
            useEffect(() => {
                if (!symbol) return;
                const fetchTrend = async () => {
                    try {
                        const apiSymbol = String(symbol || '').replace('.P', '');
                        const res = await fetch(API_BASE + '/api/trend/' + apiSymbol);
                        if (res.ok) setTrendData(await res.json());
                    } catch (e) { console.warn('Trend fetch error:', e); }
                };
                fetchTrend();
                const interval = setInterval(fetchTrend, 60000); // Refresh every 1 min
                return () => clearInterval(interval);
            }, [symbol]);

            const timeframes = [
                { label: '1m', value: '1' },
                { label: '5m', value: '5' },
                { label: '15m', value: '15' },
                { label: '1h', value: '60' },
                { label: '4h', value: '240' },
            ];

            const fetchHistory = async () => {
                if (!symbol || !isMounted.current) return;
                let apiSymbol = String(symbol || '').replace('.P', '').replace('.p', '').trim();
                if (!apiSymbol.endsWith('-SWAP')) {
                    if (apiSymbol.endsWith('USDT')) {
                        apiSymbol = apiSymbol.replace('USDT', '-USDT-SWAP');
                    } else {
                        apiSymbol = apiSymbol + '-USDT-SWAP';
                    }
                }
                
                let okxTf = "15m";
                if (tf === "1") okxTf = "1m";
                else if (tf === "5") okxTf = "5m";
                else if (tf === "15") okxTf = "15m";
                else if (tf === "30") okxTf = "30m";
                else if (tf === "60") okxTf = "1H";
                else if (tf === "120") okxTf = "2H";
                else if (tf === "240") okxTf = "4H";
                else if (tf === "1440") okxTf = "1D";

                console.log(`[Chart] Fetching history from OKX for ${apiSymbol} (Display: ${symbol}) @ ${okxTf}`);
                try {
                    const response = await fetch(`https://www.okx.com/api/v5/market/candles?instId=${apiSymbol}&bar=${okxTf}&limit=300`);
                    const json = await response.json();

                    if (!isMounted.current || !seriesRef.current) return;

                    if (json.data && Array.isArray(json.data)) {
                        console.log(`[Chart] Received ${json.data.length} candles for ${symbol}`);
                        const klines = json.data.map(k => ({
                            time: parseInt(k[0]) / 1000,
                            open: parseFloat(k[1]),
                            high: parseFloat(k[2]),
                            low: parseFloat(k[3]),
                            close: parseFloat(k[4]),
                            volume: parseFloat(k[5])
                        })).sort((a, b) => a.time - b.time);

                        // Safety check: Ensure chart is still active before updating
                        if (!isMounted.current || !chartRef.current || !seriesRef.current) return;

                        try {
                            if (seriesRef.current) seriesRef.current.setData(klines);

                            // Indicators Calculation
                            if (volumeSeriesRef.current) {
                                volumeSeriesRef.current.setData(klines.map(k => ({
                                    time: k.time,
                                    value: k.volume,
                                    color: k.close >= k.open ? 'rgba(255, 255, 255, 0.3)' : 'rgba(239, 68, 68, 0.3)'
                                })));
                            }

                            if (ema20Ref.current) ema20Ref.current.setData(calculateSMA(klines, 100).filter(d => d !== null));
                            if (ema200Ref.current) ema200Ref.current.setData(calculateSMA(klines, 21).filter(d => d !== null));

                            // SuperTrend (10, 2)
                            if (stUpRef.current && stDownRef.current) {
                                const stData = calculateSuperTrend(klines, 10, 2);
                                const upD = []; const downD = []; const markers = []; let lDir = null;
                                stData.forEach(d => {
                                    if(!d) return;
                                    if(d.color === '#ffffff'){
                                        upD.push({time: d.time, value: d.value});
                                        if(lDir !== 1){ markers.push({time: d.time, position: 'belowBar', color: '#ffffff', shape: 'arrowUp', text: 'BUY'}); lDir = 1; }
                                    }else if(d.color === '#EF4444'){
                                        downD.push({time: d.time, value: d.value});
                                        if(lDir !== -1){ markers.push({time: d.time, position: 'aboveBar', color: '#EF4444', shape: 'arrowDown', text: 'SELL'}); lDir = -1; }
                                    }
                                });
                                stUpRef.current.setData(upD);
                                stDownRef.current.setData(downD);
                                if(seriesRef.current) { seriesRef.current.setMarkers(markers); }
                            }

                            // Pivot Points
                            const pivots = calculatePivotPoints(klines);
                            if (pivots && seriesRef.current) {
                                if (pivotLinesRef.current) pivotLinesRef.current.forEach(l => seriesRef.current.removePriceLine(l));
                                pivotLinesRef.current = [
                                    seriesRef.current.createPriceLine({ price: pivots.p, color: 'rgba(255, 255, 255, 0.4)', lineWidth: 1, lineStyle: 2, title: 'P' }),
                                    seriesRef.current.createPriceLine({ price: pivots.r1, color: 'rgba(255, 255, 255, 0.2)', lineWidth: 1, lineStyle: 2, title: 'R1' }),
                                    seriesRef.current.createPriceLine({ price: pivots.s1, color: 'rgba(239, 68, 68, 0.2)', lineWidth: 1, lineStyle: 2, title: 'S1' })
                                ];
                            }

                            // Zones Update (Base on entry)
                            if (zonesRef.current) {
                                zonesRef.current.setData(klines.map(k => ({ time: k.time, value: k.close })));
                            }
                        } catch (err) {
                            console.warn("[Chart] Update skipped (chart disposed)", err);
                        }
                    }
                } catch (e) { if (isMounted.current) console.error("History Error", e); }
            };

            const volumeSeriesRef = useRef();
            const ema20Ref = useRef();
            const ema200Ref = useRef();
            const stUpRef = useRef();
            const stDownRef = useRef();
            const pivotLinesRef = useRef([]);
            const zonesRef = useRef();

            useEffect(() => {
                if (!chartContainerRef.current) return;
                if (chartRef.current) { chartRef.current.remove(); }

                isMounted.current = true; // Ensure we are marked as mounted for this effect cycle
                let active = true;

                // Chart Configuration with dynamic height check
                const containerHeight = chartContainerRef.current.clientHeight || 250;
                const containerWidth = chartContainerRef.current.clientWidth || 400;

                const chart = LightweightCharts.createChart(chartContainerRef.current, {
                    width: containerWidth,
                    height: containerHeight,
                    layout: { background: { type: 'solid', color: 'transparent' }, textColor: '#cbd5e1' },
                    grid: { vertLines: { color: 'rgba(255, 255, 255, 0.03)', style: 1 }, horzLines: { color: 'rgba(255, 255, 255, 0.03)', style: 1 } },
                    rightPriceScale: {
                        borderColor: 'rgba(255, 255, 255, 0.1)',
                        autoScale: true,
                        scaleMargins: { top: 0.1, bottom: 0.1 }
                    },
                    timeScale: { borderColor: 'rgba(255, 255, 255, 0.1)', timeVisible: true },
                    crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
                    localization: {
                        priceFormatter: (price) => {
                            if (price >= 1000) return price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                            if (price >= 1) return price.toLocaleString('en-US', { minimumFractionDigits: 4, maximumFractionDigits: 4 });
                            if (price >= 0.001) return price.toLocaleString('en-US', { minimumFractionDigits: 6, maximumFractionDigits: 6 });
                            return price.toLocaleString('en-US', { minimumFractionDigits: 8, maximumFractionDigits: 8 });
                        }
                    }
                });

                chartRef.current = chart;

                // Volume Histogram Setup
                const volumeSeries = chart.addHistogramSeries({
                    priceFormat: { type: 'volume' },
                    priceScaleId: 'volume'
                });

                chart.priceScale('volume').applyOptions({
                    scaleMargins: { top: 0.7, bottom: 0 },
                    visible: false
                });
                volumeSeriesRef.current = volumeSeries;

                ema200Ref.current = chart.addLineSeries({ color: '#FFFFFF', lineWidth: 3, title: '', lastValueVisible: false, priceLineVisible: false });
                ema20Ref.current = chart.addLineSeries({ color: '#FFFF00', lineWidth: 3, title: '', lastValueVisible: false, priceLineVisible: false });
                stUpRef.current = chart.addLineSeries({ color: '#00E676', lineWidth: 3, title: '', lastValueVisible: false, priceLineVisible: false });
                stDownRef.current = chart.addLineSeries({ color: '#FF1744', lineWidth: 3, title: '', lastValueVisible: false, priceLineVisible: false });

                zonesRef.current = chart.addBaselineSeries({
                    baseValue: { type: 'price', price: Number(entryPrice) || 0 },
                    topFillColor1: 'rgba(255, 255, 255, 0.1)', topFillColor2: 'rgba(255, 255, 255, 0.05)',
                    bottomFillColor1: 'rgba(239, 68, 68, 0.1)', bottomFillColor2: 'rgba(239, 68, 68, 0.05)',
                    lineVisible: false, axisLabelVisible: false, priceLineVisible: false,
                });

                const candleSeries = chart.addCandlestickSeries({
                    upColor: '#ffffff', downColor: '#EF4444', borderVisible: true, borderColor: '#000000', wickUpColor: '#ffffff', wickDownColor: '#EF4444',
                    priceFormat: {
                        type: 'price',
                        precision: 6,
                        minMove: 0.000001
                    }
                });
                seriesRef.current = candleSeries;

                // Initial fetch
                fetchHistory();

                const handleResize = () => {
                    if (chartRef.current && chartContainerRef.current) {
                        chartRef.current.applyOptions({ width: chartContainerRef.current.clientWidth });
                    }
                };

                const chartWsRef = { current: null };
                const chartReconnectTimeoutRef = { current: null };

                const connectWs = () => {
                    if (chartWsRef.current) {
                        // V110.201: Prevent closing while connecting to avoid console spam
                        chartWsRef.current.onclose = null;
                        chartWsRef.current.onerror = null;
                        if (chartWsRef.current.readyState === WebSocket.OPEN) {
                            chartWsRef.current.close();
                        }
                    }

                    const ws = new WebSocket('wss://ws.okx.com:8443/ws/v5/public');
                    chartWsRef.current = ws;
                    
                    let apiSymbol = String(symbol || '').replace('.P', '').replace('.p', '').trim();
                    if (!apiSymbol.endsWith('-SWAP')) {
                        if (apiSymbol.endsWith('USDT')) {
                            apiSymbol = apiSymbol.replace('USDT', '-USDT-SWAP');
                        } else {
                            apiSymbol = apiSymbol + '-USDT-SWAP';
                        }
                    }

                    let okxTf = "15m";
                    if (tf === "1") okxTf = "1m";
                    else if (tf === "5") okxTf = "5m";
                    else if (tf === "15") okxTf = "15m";
                    else if (tf === "30") okxTf = "30m";
                    else if (tf === "60") okxTf = "1H";
                    else if (tf === "120") okxTf = "2H";
                    else if (tf === "240") okxTf = "4H";
                    else if (tf === "1440") okxTf = "1D";

                    const channelCandle = `candle${okxTf}`;
                    let heartbeatInterval;

                    ws.onopen = () => {
                        if (ws.readyState === WebSocket.OPEN) {
                            ws.send(JSON.stringify({
                                op: 'subscribe',
                                args: [
                                    { channel: channelCandle, instId: apiSymbol },
                                    { channel: 'tickers', instId: apiSymbol }
                                ]
                            }));
                        }
                        heartbeatInterval = setInterval(() => {
                            if (ws.readyState === WebSocket.OPEN) {
                                ws.send("ping");
                            }
                        }, 20000);
                    };

                    ws.onmessage = (event) => {
                        if (event.data === "pong") return;
                        if (!active || !isMounted.current || !chartRef.current) return;
                        try {
                            const msg = JSON.parse(event.data);
                            if (msg.arg && msg.arg.channel && msg.arg.channel.startsWith('candle') && seriesRef.current && msg.data) {
                                const k = msg.data[0];
                                const update = {
                                    time: parseInt(k[0]) / 1000,
                                    open: parseFloat(k[1]),
                                    high: parseFloat(k[2]),
                                    low: parseFloat(k[3]),
                                    close: parseFloat(k[4])
                                };
                                if (seriesRef.current) seriesRef.current.update(update);
                                if (volumeSeriesRef.current) volumeSeriesRef.current.update({ ...update, value: parseFloat(k[5]), color: update.close >= update.open ? 'rgba(255, 255, 255, 0.3)' : 'rgba(239, 68, 68, 0.3)' });
                                if (zonesRef.current) zonesRef.current.update({ time: update.time, value: update.close });
                            }
                            if (msg.arg && msg.arg.channel === 'tickers' && msg.data && msg.data[0].last) {
                                setLastPrice(parseFloat(msg.data[0].last));
                            }
                        } catch (e) { }
                    };

                    ws.onclose = () => {
                        clearInterval(heartbeatInterval);
                        if (active) {
                            chartReconnectTimeoutRef.current = setTimeout(connectWs, 3000);
                        }
                    };

                    ws.onerror = (e) => {
                        if (ws.readyState === WebSocket.OPEN) ws.close();
                    };
                };

                connectWs();

                window.addEventListener('resize', handleResize);

                return () => {
                    active = false;
                    window.removeEventListener('resize', handleResize);
                    if (chartWsRef.current) {
                        chartWsRef.current.onclose = null;
                        chartWsRef.current.close();
                    }
                    if (chartReconnectTimeoutRef.current) clearTimeout(chartReconnectTimeoutRef.current);
                    if (chartRef.current) {
                        chartRef.current.remove();
                        chartRef.current = null;
                    }
                };
            }, [symbol, tf]);

            const extraLinesRef = useRef([]);

            useEffect(() => {
                if (!seriesRef.current || !chartRef.current) return;

                // SMALL DELAY: Stability shield for rapid updates
                const timeout = setTimeout(() => {
                    if (!isMounted.current || !seriesRef.current || !chartRef.current) return;

                    // 1. Clear ALL lines (Atomic reset)
                    [...linesRef.current, ...extraLinesRef.current].forEach(line => {
                        try { seriesRef.current.removePriceLine(line); } catch (e) { }
                    });
                    linesRef.current = [];
                    extraLinesRef.current = [];

                    // 2. Render Order Lines (Priority)
                    const ne = Number(entryPrice);
                    const ns = Number(stopLossPrice);
                    const nt = Number(targetPrice);

                    if (symbol && ne > 0) {
                        // Entry
                        try {
                            linesRef.current.push(seriesRef.current.createPriceLine({
                                price: ne, color: '#f3f4f6', lineWidth: 2, lineStyle: LightweightCharts.LineStyle.Solid,
                                axisLabelVisible: true, title: 'ENTRY'
                            }));
                        } catch (e) { }

                        // [V110.658] STOP LOSS DINÂMICO (Solo View)
                        const normSide = (side || '').toUpperCase().trim();
                        const isLong = ['BUY', 'LONG', 'B', 'L', 'LONGUSDT'].includes(normSide);
                        const leverageVal = parseFloat(leverage || 50);
                        const nsVal = ns > 0 ? ns : (isLong ? ne * (1 - (1.5 / leverageVal) / 100) : ne * (1 + (1.5 / leverageVal) / 100));
                        
                        // Determina Status Visual do Stop + Degrau Ativo
                        let slColor = '#EF4444'; // Red (Normal)
                        let slTitle = 'STOP LOSS';
                        let slWidth = 2;
                        
                        if (ns > 0) {
                            const isRiskFree = isLong ? (ns >= ne - (ne * 0.0005)) : (ns <= ne + (ne * 0.0005));
                            const isProfitLocked = isLong ? (ns > ne * 1.01) : (ns < ne * 0.99);
                            
                            if (isProfitLocked) {
                                slColor = '#10b981'; // Emerald
                                slTitle = 'PROFIT-LOCKED 💎';
                                slWidth = 3;
                            } else if (isRiskFree) {
                                slColor = '#3B82F6'; // Blue
                                slTitle = 'RISK-FREE 🛡️';
                                slWidth = 3;
                            }
                            
                            // Identifica degrau ativo da Escadinha BLITZ
                            const stopRoi = isLong 
                                ? ((ns - ne) / ne) * leverageVal * 100
                                : ((ne - ns) / ne) * leverageVal * 100;
                            let degrauLabel = '';
                            if (stopRoi >= 95) degrauLabel = 'UNIT1';
                            else if (stopRoi >= 50) degrauLabel = 'RZ';
                            else if (stopRoi >= 5) degrauLabel = 'BE';
                            if (degrauLabel) {
                                slTitle = slTitle === 'STOP LOSS' ? degrauLabel : `${slTitle} | ${degrauLabel}`;
                            }
                        }

                        try {
                            linesRef.current.push(seriesRef.current.createPriceLine({
                                price: nsVal, 
                                color: slColor, 
                                lineWidth: slWidth, 
                                lineStyle: LightweightCharts.LineStyle.Solid,
                                axisLabelVisible: true, 
                                title: slTitle
                            }));
                        } catch (e) { }

                        // Escadinha de Elite (Targets)
                        const isSniper = slotId <= 5 || slotType === 'SNIPER' || String(slotType).startsWith('BLITZ') || slotType === 'TREND' || slotType === 'MOONBAG';
                        if (isSniper && ne > 0) {
                            // Escadinha BLITZ (alinhada com Flash Agent)
                            const isBlitz = String(slotType).startsWith('BLITZ') || slotType === 'SNIPER';
                            const levels = isBlitz ? [
                                { roi: 5,  color: 'rgba(107, 114, 128, 0.5)', title: 'BREAKEVEN (5%)', dash: true },
                                { roi: 50, color: 'rgba(16, 185, 129, 0.6)', title: 'RISCO ZERO (50%)', dash: true },
                                { roi: 95, color: 'rgba(34, 211, 238, 0.7)', title: 'UNIT1 (95%)', dash: true },
                                { roi: 110,color: 'rgba(16, 185, 129, 0.9)', title: 'EMANCIPACAO (110%)', dash: false },
                            ] : [
                                { roi: 30,  color: 'rgba(34, 197, 94, 0.3)', title: 'T1 (30%)', dash: true },
                                { roi: 50,  color: 'rgba(34, 197, 94, 0.5)', title: 'T2 (50%)', dash: true },
                                { roi: 70,  color: 'rgba(34, 197, 94, 0.7)', title: 'T3 (70%)', dash: true },
                                { roi: 110, color: 'rgba(234, 179, 8, 0.8)',  title: 'T4 (110%)', dash: true },
                                { roi: 150, color: '#22c55e',                title: 'T5 (150%)', dash: false }
                            ];

                            levels.forEach(lvl => {
                                const leverageVal = parseFloat(leverage || 50);
                                const move = lvl.roi / (leverageVal * 100);
                                const p = isLong ? ne * (1 + move) : ne * (1 - move);
                                try {
                                    linesRef.current.push(seriesRef.current.createPriceLine({
                                        price: p, 
                                        color: lvl.color, 
                                        lineWidth: lvl.dash ? 1 : 2, 
                                        lineStyle: lvl.dash ? LightweightCharts.LineStyle.Dashed : LightweightCharts.LineStyle.Solid,
                                        axisLabelVisible: true, 
                                        title: lvl.title
                                    }));
                                } catch (e) { }
                            });
                            
                            // Final Target (if different from 150%)
                            if (nt > 0) {
                                const leverageVal = parseFloat(leverage || 50);
                                const move150 = 150 / (leverageVal * 100);
                                const target150 = isLong ? ne * (1 + move150) : ne * (1 - move150);
                                if (Math.abs(nt - target150) / ne > 0.005) {
                                    try {
                                        linesRef.current.push(seriesRef.current.createPriceLine({
                                            price: nt, color: '#edbc1d', lineWidth: 1, lineStyle: LightweightCharts.LineStyle.Dotted,
                                            axisLabelVisible: true, title: 'FINAL TARGET'
                                        }));
                                    } catch (e) { }
                                }
                            }
                        }
                    }

                    // 3. Render Trend Data (Background)
                    if (trendData) {
                        if (trendData.liquidity_zones) {
                            trendData.liquidity_zones.forEach(zone => {
                                const isMain = !zone.type.includes('secondary');
                                try {
                                    extraLinesRef.current.push(seriesRef.current.createPriceLine({
                                        price: zone.price,
                                        color: zone.type.includes('high') ? 'rgba(239, 68, 68, 0.25)' : 'rgba(255, 255, 255, 0.1)',
                                        lineWidth: 1,
                                        lineStyle: isMain ? LightweightCharts.LineStyle.Dashed : LightweightCharts.LineStyle.Dotted,
                                        axisLabelVisible: true,
                                        title: `LIQ ${zone.type.toUpperCase()}`
                                    }));
                                } catch (e) { }
                            });
                        }
                        if (trendData.accumulation_boxes) {
                            trendData.accumulation_boxes.forEach((box, idx) => {
                                try {
                                    extraLinesRef.current.push(seriesRef.current.createPriceLine({
                                        price: box.top, color: 'rgba(255, 255, 255, 0.3)', lineWidth: 1, title: idx === 0 ? 'ACC BOX' : ''
                                    }));
                                    extraLinesRef.current.push(seriesRef.current.createPriceLine({
                                        price: box.bottom, color: 'rgba(255, 255, 255, 0.3)', lineWidth: 1
                                    }));
                                } catch (e) { }
                            });
                        }
                    }

                    // 4. Update Baseline (Fills)
                    if (zonesRef.current && ne > 0) {
                        zonesRef.current.applyOptions({ baseValue: { type: 'price', price: ne } });
                    }

                }, 150);
                return () => clearTimeout(timeout);
            }, [symbol, entryPrice, stopLossPrice, targetPrice, side, tf, trendData]);

            // PnL Latch Logic with EMA Smoothing
            const [displayPnl, setDisplayPnl] = useState(0);
            const smoothingRef = useRef(0);

            useEffect(() => {
                let livePnl = 0;
                if (lastPrice && Number(entryPrice) > 0) {
                    const ne = Number(entryPrice);
                    const normSide = (side || '').toUpperCase();
                    livePnl = normSide === 'BUY' ? ((lastPrice - ne) / ne * 50 * 100) : ((ne - lastPrice) / ne * 50 * 100);
                }

                const targetPnl = livePnl !== 0 ? livePnl : (pnlFallback || 0);

                // EMA Smoothing: NewVal = (Current * Alpha) + (Previous * (1 - Alpha))
                const alpha = 0.15; // Lower = smoother, higher = faster
                const nextVal = (targetPnl * alpha) + (smoothingRef.current * (1 - alpha));

                smoothingRef.current = nextVal;
                setDisplayPnl(nextVal);
            }, [lastPrice, entryPrice, side, pnlFallback]);

            return (
                <div className="w-full h-full relative group">
                    {/* Timeframe Selector - Compacto */}
                    <div className="absolute top-2 left-2 z-20 flex gap-1 bg-black/60 p-1 rounded border border-white/10 backdrop-blur-md tf-selector-compact">
                        {timeframes.map(t => (
                            <button key={t.value} onClick={(e) => { e.stopPropagation(); setTf(t.value); }}
                                className={`px-1.5 py-0.5 text-[8px] font-bold rounded transition-colors ${tf === t.value ? 'bg-primary text-black' : 'text-gray-400 hover:text-white hover:bg-white/10'}`}>
                                {t.label}
                            </button>
                        ))}
                    </div>

                    <div className="absolute top-4 right-4 z-10 flex flex-col items-end pointer-events-none">
                        <div className="bg-black/80 px-3 py-1 rounded border border-white/10 backdrop-blur-md">
                            <span className="text-[10px] text-gray-400 uppercase font-bold mr-2">Market:</span>

        // --- Hook: Real-time OKX Tickers ---
        const useOkxTickers = (activeSymbols) => {
            const [tickers, setTickers] = useState({});
            const wsRef = useRef(null);
            const reconnectTimeoutRef = useRef(null);

            useEffect(() => {
                if (!activeSymbols || activeSymbols.length === 0) return;

                const connect = () => {
                    if (wsRef.current) {
                        wsRef.current.onclose = null;
                        wsRef.current.onerror = null;
                        if (wsRef.current.readyState === WebSocket.OPEN) {
                            wsRef.current.close();
                        }
                    }

                    const ws = new WebSocket('wss://ws.okx.com:8443/ws/v5/public');
                    wsRef.current = ws;

                    const args = activeSymbols.map(s => {
                        let apiSymbol = s.replace('.P', '').replace('.p', '').trim();
                        if (!apiSymbol.endsWith('-SWAP')) {
                            if (apiSymbol.endsWith('USDT')) {
                                apiSymbol = apiSymbol.replace('USDT', '-USDT-SWAP');
                            } else {
                                apiSymbol = apiSymbol + '-USDT-SWAP';
                            }
                        }
                        return { channel: 'tickers', instId: apiSymbol };
                    }).filter(Boolean);

                    let heartbeatInterval;

                    ws.onopen = () => {
                        console.log("[WS] OKX Tickers Connected");
                        if (args.length > 0) {
                            ws.send(JSON.stringify({ op: 'subscribe', args: args }));
                        }
                        // Heartbeat Ping (OKX accepts "ping" string)
                        heartbeatInterval = setInterval(() => {
                            if (ws.readyState === WebSocket.OPEN) {
                                ws.send("ping");
                            }
                        }, 20000);
                    };

                    ws.onmessage = (event) => {
                        if (event.data === "pong") return;
                        try {
                            const msg = JSON.parse(event.data);
                            if (msg.arg && msg.arg.channel === 'tickers' && msg.data && msg.data[0].last) {
                                const okxSymbol = msg.arg.instId;
                                const symbol = okxSymbol.replace('-USDT-SWAP', 'USDT');
                                const price = parseFloat(msg.data[0].last);
                                if (!isNaN(price) && price > 0) {
                                    setTickers(prev => ({ ...prev, [symbol]: price }));
                                }
                            }
                        } catch (e) {}
                    };

                    ws.onclose = () => {
                        console.warn("[WS] OKX Tickers Disconnected. Reconnecting...");
                        clearInterval(heartbeatInterval);
                        reconnectTimeoutRef.current = setTimeout(connect, 3000);
                    };

                    ws.onerror = (err) => {
                        if (ws.readyState === WebSocket.OPEN) ws.close();
                    };
                };

                connect();

                return () => {
                    if (wsRef.current) {
                        wsRef.current.onclose = null;
                        wsRef.current.close();
                    }
                    if (reconnectTimeoutRef.current) clearTimeout(reconnectTimeoutRef.current);
                };
            }, [activeSymbols.join(',')]);

        // Hook for Text-to-Speech (TTS) - V5.3.3 Enhanced for Mobile
        const useSpeechSynthesis = () => {
            const [isSpeaking, setIsSpeaking] = useState(false);
            const [voices, setVoices] = useState([]);
            const audioRef = useRef(null);

            // Load voices once
            useEffect(() => {
                const loadVoices = () => {
                    const availableVoices = window.speechSynthesis.getVoices();
                    if (availableVoices.length > 0) {
                        setVoices(availableVoices);
                    }
                };
                loadVoices();
                if (window.speechSynthesis.onvoiceschanged !== undefined) {
                    window.speechSynthesis.onvoiceschanged = loadVoices;
                }
            }, []);

            const speak = async (text) => {
                if (!text) return;

                // Stop any current speaking
                stop();
                setIsSpeaking(true);

                try {
                    // 1. Try Premium API (Antonio/Google)
                    const response = await fetch(`${API_BASE}/api/tts`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            text: text,
                            voice: 'pt-BR-AntonioNeural'
                        })
                    });

                    const data = await response.json();

                    if (data.audio) {
                        const audioBlob = new Blob(
                            [Uint8Array.from(atob(data.audio), c => c.charCodeAt(0))],
                            { type: 'audio/mp3' }
                        );
                        const audioUrl = URL.createObjectURL(audioBlob);

                        const audio = new Audio();
                        audio.src = audioUrl;
                        audioRef.current = audio;

                        audio.onended = () => {
                            setIsSpeaking(false);
                            URL.revokeObjectURL(audioUrl);
                        };
                        audio.onerror = () => {
                            console.warn("Audio element error, falling back...");
                            fallbackSpeak(text);
                        };

                        try {
                            await audio.play();
                            return; // SUCCESS
                        } catch (playErr) {
                            console.warn("Auto-play blocked, using fallback:", playErr);
                            // If blocked, fallback to Web Speech which has better bypass on some devices
                            fallbackSpeak(text);
                            return;
                        }
                    }
                } catch (e) {
                    console.log('Premium TTS unavailable:', e);
                }

                fallbackSpeak(text);
            };

            const fallbackSpeak = (text) => {
                if (!('speechSynthesis' in window)) {
                    setIsSpeaking(false);
                    return;
                }

                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'pt-BR';
                utterance.rate = 1.0;
                utterance.pitch = 1.0;

                const availableVoices = voices.length > 0 ? voices : window.speechSynthesis.getVoices();

                // V5.3.3: Extreme Male Voice search (Mobile prioritized)
                // Prioritize "Daniel" (iOS Male), then "Antonio" (Edge), then generic "Male"
                let maleVoice = availableVoices.find(v =>
                    v.lang.startsWith('pt') &&
                    (v.name.includes('Daniel') || v.name.includes('Antonio') || v.name.includes('Guilherme'))
                );

                if (!maleVoice) {
                    maleVoice = availableVoices.find(v =>
                        v.lang.startsWith('pt') &&
                        (v.name.toLowerCase().includes('male') || v.name.toLowerCase().includes('masculino'))
                    );
                }

                // Fallback to first PT voice
                const finalVoice = maleVoice || availableVoices.find(v => v.lang.startsWith('pt'));
                if (finalVoice) utterance.voice = finalVoice;

                utterance.onstart = () => setIsSpeaking(true);
                utterance.onend = () => setIsSpeaking(false);
                utterance.onerror = (err) => {
                    console.error("SpeechSynthesis Error:", err);
                    setIsSpeaking(false);
                };

                window.speechSynthesis.speak(utterance);
            };

            const stop = () => {
                if (audioRef.current) {
                    audioRef.current.pause();
                    audioRef.current = null;
                }
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                }
                setIsSpeaking(false);
            };

            return { speak, stop, isSpeaking };
        };

        // =========================================================================

        // =========================================================================
        // [V67.5] GridChartItem: Reusable chart component for the Desktop Dashboard Grid
        // =========================================================================
        const GridChartItem = ({ 
            symbol, slots, index, totalCharts,
            onSymbolChange, focusedAsset, pulseStatus, moonbags = [] 
        }) => {
            const chartContainerRef = useRef(null);
            const chartInstance = useRef(null);
            const candlestickSeries = useRef(null);
            const [localSymbol, setLocalSymbol] = useState(symbol || "BTCUSDT");
            const [localTimeframe, setLocalTimeframe] = useState("15");
            const [historicalData, setHistoricalData] = useState({ candles: [], volumes: [] });
            const [eagleMode, setEagleMode] = useState(() => {
                try { return localStorage.getItem('eagle_vision_mode_grid') !== 'simple'; } catch(e) { return true; }
            });
            const priceLinesRef = useRef({ entry: null, sl: null, tp: null });
            const priceLinesSignatureRef = useRef('');
            const isFirstLoadRef = useRef(true);
            const [tooltip, setTooltip] = useState(null);
            const [telemetry, setTelemetry] = useState({ rsi: null, adx: null, volatility: null, cvd: null });
            const [settings, setSettings] = useState(() => {
                try { 
                    const saved = localStorage.getItem('eagle_vision_settings');
                    return saved ? JSON.parse(saved) : { volume: true, sma: true, adx: true, cvd: true, sentinel: true };
                } catch(e) { return { volume: true, sma: true, adx: true, cvd: true, sentinel: true }; }
            });
            const [showSettings, setShowSettings] = useState(false);

            useEffect(() => {
                localStorage.setItem('eagle_vision_settings', JSON.stringify(settings));
            }, [settings]);

            // Indicator Series Refs
            const sma21SeriesRef = useRef(null);
            const sma100SeriesRef = useRef(null);
            const gutterLabelsRef = useRef([]);

            useEffect(() => {
                try { localStorage.setItem('eagle_vision_mode_grid', eagleMode ? 'analytic' : 'simple'); } catch(e) {}
            }, [eagleMode]);

            useEffect(() => {
                if (focusedAsset && focusedAsset.symbol) {
                    setLocalSymbol(focusedAsset.symbol);
                } else {
                    setLocalSymbol(symbol || "BTCUSDT");
                }
            }, [symbol, focusedAsset]);

            useEffect(() => {
                isFirstLoadRef.current = true;
                const fetchKlines = async () => {
                    if (!localSymbol || localSymbol.length < 3 || localSymbol === 'VVV' || localSymbol.includes('undefined')) return;
                    try {
                        const res = await fetch(`${API_BASE}/api/market/klines?symbol=${localSymbol}&interval=${localTimeframe}&limit=350`);
                        const data = await res.json();
                        if (!Array.isArray(data) || data.length === 0) return;
                        
                        const formatted = data.map(d => ({
                            time: (parseInt(d[0]) / 1000),
                            open: parseFloat(d[1]),
                            high: parseFloat(d[2]),
                            low: parseFloat(d[3]),
                            close: parseFloat(d[4]),
                            volume: parseFloat(d[5])
                        })).filter(k => !isNaN(k.time) && !isNaN(k.open) && !isNaN(k.high) && !isNaN(k.low) && !isNaN(k.close) && !isNaN(k.volume));
                        const volumes = formatted.map(d => ({
                            time: d.time,
                            value: d.volume,
                            color: d.close >= d.open ? 'rgba(34, 197, 94, 0.5)' : 'rgba(239, 68, 68, 0.5)'
                        }));
                        setHistoricalData({ candles: formatted, volumes });

                        // Update Telemetry
                        if (formatted.length > 20) {
                            const last = formatted[formatted.length - 1];
                            const vol = ((last.high - last.low) / last.low * 100).toFixed(2);
                            
                            // Calculate CVD properly from the whole set
                            let cumulativeDelta = 0;
                            formatted.forEach(c => {
                                const delta = c.close >= c.open ? c.volume : -c.volume;
                                cumulativeDelta += delta;
                            });

                            setTelemetry({
                                rsi: Math.floor(40 + Math.random() * 30),
                                adx: Math.floor(20 + Math.random() * 25),
                                volatility: vol,
                                cvd: cumulativeDelta
                            });
                        }
                    } catch (e) {
                        console.error("Failed to fetch klines for grid item", localSymbol, e);
                    }
                };
                fetchKlines();
                const itv = setInterval(fetchKlines, 60000);
                return () => clearInterval(itv);
            }, [localSymbol, localTimeframe]);

            // Init Chart
            useEffect(() => {
                if (!chartContainerRef.current) return;
                const chart = LightweightCharts.createChart(chartContainerRef.current, {
                    layout: { 
                        background: { color: 'transparent' }, 
                        textColor: '#94a3b8', 
                        fontSize: 10,
                        fontFamily: 'JetBrains Mono'
                    },
                    grid: { 
                        vertLines: { color: 'rgba(255, 255, 255, 0.02)' }, 
                        horzLines: { color: 'rgba(255, 255, 255, 0.02)' } 
                    },
                    width: chartContainerRef.current.clientWidth,
                    height: chartContainerRef.current.clientHeight,
                    timeScale: { timeVisible: true, borderColor: 'rgba(255, 255, 255, 0.05)' },
                    crosshair: {
                        mode: LightweightCharts.CrosshairMode.Normal,
                        vertLine: { color: 'rgba(255, 255, 255, 0.2)', width: 1, style: 2, labelBackgroundColor: '#1e293b' },
                        horzLine: { color: 'rgba(255, 255, 255, 0.2)', width: 1, style: 2, labelBackgroundColor: '#1e293b' },
                    },
                    rightPriceScale: { borderColor: 'rgba(255, 255, 255, 0.05)' }
                });
                
                const series = chart.addCandlestickSeries({
                    upColor: '#10b981', downColor: '#ef4444', borderVisible: false,
                    wickUpColor: '#10b981', wickDownColor: '#ef4444'
                });
                
                const volSeries = chart.addHistogramSeries({
                    priceFormat: { type: 'volume' },
                    priceScaleId: 'vol', // Separated scale
                });
                chart.priceScale('vol').applyOptions({
                    scaleMargins: { top: 0.7, bottom: 0 },
                    visible: false
                });

                sma21SeriesRef.current = chart.addLineSeries({ color: '#FFFFFF', lineWidth: 3, title: '', visible: eagleMode, axisLabelVisible: false, lastValueVisible: false, priceLineVisible: false });
                sma100SeriesRef.current = chart.addLineSeries({ color: '#FFFF00', lineWidth: 3, title: '', visible: eagleMode, axisLabelVisible: false, lastValueVisible: false, priceLineVisible: false });

                // Gutter Sync
                chart.timeScale().subscribeVisibleLogicalRangeChange(() => {
                    syncGutter();
                });

                chartInstance.current = chart;
                candlestickSeries.current = series;
                chartInstance.current.volumeSeries = volSeries;

                // Tooltip Interaction
                chart.subscribeCrosshairMove(param => {
                    if (param.time && param.seriesData.get(series)) {
                        const data = param.seriesData.get(series);
                        setTooltip({
                            time: param.time,
                            open: data.open,
                            high: data.high,
                            low: data.low,
                            close: data.close,
                            x: param.point.x,
                            y: param.point.y
                        });
                    } else {
                        setTooltip(null);
                    }
                });

                const resizeObserver = new ResizeObserver(entries => {
                    if (entries.length > 0 && entries[0].contentRect) {
                        chart.applyOptions({ 
                            width: entries[0].contentRect.width, 
                            height: entries[0].contentRect.height 
                        });
                    }
                });
                resizeObserver.observe(chartContainerRef.current);

                return () => {
                    resizeObserver.disconnect();
                    chart.remove();
                };
            }, []);

            const syncGutter = () => {
                const container = document.getElementById(`gutter-${index}`);
                if (!container || !candlestickSeries.current) return;

                const levels = [];
                
                // SMAs
                if (settings.sma && eagleMode && historicalData.candles.length > 0) {
                    const sma21 = window.calculateSMA(historicalData.candles, 21);
                    const sma100 = window.calculateSMA(historicalData.candles, 100);
                    
                    if (sma21.length > 0) levels.push({ value: sma21[sma21.length-1].value, label: 'SMA 21', color: '#FFFFFF' });
                    if (sma100.length > 0) levels.push({ value: sma100[sma100.length-1].value, label: 'SMA 100', color: '#FFFF00' });
                }

                // Price Lines
                const activeSlot = slots.find(s => s && s.symbol && normalizeTradeSymbol(s.symbol) === normalizeTradeSymbol(localSymbol));
                const activeMoon = moonbags && moonbags.find(m => m && m.symbol && normalizeTradeSymbol(m.symbol) === normalizeTradeSymbol(localSymbol));
                let points = null;
                
                if (activeMoon) {
                    const sideUpper = (activeMoon.side || "").toUpperCase().trim();
                    const isLong = ['BUY', 'LONG', 'LONGUSDT', 'B', 'L'].includes(sideUpper);
                    const leverage = activeMoon.leverage || 50;
                    let sl = parseFloat(activeMoon.stopLoss || activeMoon.current_stop || activeMoon.stop_loss || 0);
                    
                    if (sl <= 0) {
                        const move = 1.1 / leverage;
                        sl = isLong ? (parseFloat(activeMoon.entry_price) * (1 + move)) : (parseFloat(activeMoon.entry_price) * (1 - move));
                    }
                    
                    points = { 
                        entry: parseFloat(activeMoon.entry_price), 
                        sl: sl, 
                        side: activeMoon.side, 
                        leverage: leverage, 
                        isLong,
                        target_price: null,
                        isMoonbag: true,
                        projection: activeMoon.projection
                    };
                } else if (activeSlot) {
                    // SE existe um slot ativo para este símbolo, ele é a fonte da verdade suprema (DB)
                    const sideUpper = (activeSlot.side || "").toUpperCase().trim();
                    const isLong = ['BUY', 'LONG', 'LONGUSDT', 'B', 'L'].includes(sideUpper);
                    points = { 
                        entry: parseFloat(activeSlot.entry_price), 
                        sl: parseFloat(activeSlot.current_stop || activeSlot.stop_loss), 
                        side: activeSlot.side, 
                        leverage: activeSlot.leverage || 50, 
                        isLong,
                        target_price: activeSlot.target_price,
                        t1: activeSlot.t1, t2: activeSlot.t2, t3: activeSlot.t3, t4: activeSlot.t4, t5: activeSlot.t5,
                        projection: activeSlot.projection
                    };
                } else if (focusedAsset && focusedAsset.symbol.replace('.P','').replace('.p','').toUpperCase() === localSymbol.toUpperCase()) {
                    // Fallback para focusedAsset se não for um slot (ex: Moonbag sem slot ativo)
                    const sideUpper = (focusedAsset.side || "").toUpperCase().trim();
                    const isLong = ['BUY', 'LONG', 'LONGUSDT', 'B', 'L'].includes(sideUpper);
                    points = { 
                        entry: parseFloat(focusedAsset.entry), 
                        sl: parseFloat(focusedAsset.sl), 
                        side: focusedAsset.side, 
                        leverage: focusedAsset.leverage || 50, 
                        isLong,
                        target_price: focusedAsset.target_price,
                        t1: focusedAsset.t1, t2: focusedAsset.t2, t3: focusedAsset.t3, t4: focusedAsset.t4, t5: focusedAsset.t5
                    };
                }

                if (points && points.entry > 0) {
                    levels.push({ value: points.entry, label: 'ENTRY', color: '#FFFFFF' });
                    if (points.sl > 0) {
                        let slBadgeColor = '#ef4444';
                        let slBadgeLabel = 'STOP';
                        
                        if (points.isMoonbag) {
                            const slRoi = Math.abs((points.sl - points.entry) / points.entry) * (points.leverage || 50) * 100;
                            slBadgeColor = '#10b981';
                            slBadgeLabel = `LUCRO ${slRoi.toFixed(0)}% 💎`;
                        } else {
                            const isRiskFree = points.isLong ? (points.sl >= points.entry - (points.entry * 0.0005)) : (points.sl <= points.entry + (points.entry * 0.0005));
                            const isProfitLocked = points.isLong ? (points.sl > points.entry * 1.01) : (points.sl < points.entry * 0.99);
                            
                            if (isProfitLocked) {
                                slBadgeColor = '#10b981';
                                slBadgeLabel = 'LUCRO 💎';
                            } else if (isRiskFree) {
                                slBadgeColor = '#3b82f6';
                                slBadgeLabel = 'ZERO 🛡️';
                            }
                        }
                        
                        levels.push({ value: points.sl, label: slBadgeLabel, color: slBadgeColor });
                    }
                    
                    const isLong = points.isLong;
                    const leverage = parseFloat(points.leverage || 50);
                    
                    // Alvo Principal (Structural Target ou T5 fallback)
                    const fallbackT5 = isLong ? points.entry * (1 + 1.5/leverage) : points.entry * (1 - 1.5/leverage);
                    const mainTp = points.target_price || points.t5 || fallbackT5;
                    levels.push({ value: mainTp, label: points.isMoonbag ? 'T5 💎' : 'TARGET', color: '#10b981' });

                    const backendLevels = getProjectionPriceLevels(points.projection);
                    if (backendLevels.length > 0) {
                        backendLevels.forEach(lvl => {
                            levels.push({ value: lvl.value, label: lvl.label, color: lvl.color });
                        });
                    } else {
                    const escadinhaLevels = [];
                    if (points.isMoonbag) {
                        // 🏛️ Alvos antigos táticos (T1 a T5) - Estética de alvos batidos (cinza discreto)
                        escadinhaLevels.push(
                            { roi: 30, color: 'rgba(148, 163, 184, 0.3)', title: 'T1' },
                            { roi: 50, color: 'rgba(148, 163, 184, 0.3)', title: 'T2' },
                            { roi: 70, color: 'rgba(148, 163, 184, 0.3)', title: 'T3' },
                            { roi: 110, color: 'rgba(148, 163, 184, 0.3)', title: 'T4' },
                            { roi: 150, color: 'rgba(16, 185, 129, 0.4)', title: 'T5 💎' }
                        );
                        // 🌾 Novos alvos de colheita do Ceifeiro até 1200% ROI - Cores brilhantes
                        escadinhaLevels.push(
                            { roi: 250, color: 'rgba(59, 130, 246, 0.6)', title: '1ª COL' },
                            { roi: 350, color: 'rgba(20, 184, 166, 0.7)', title: '2ª COL' },
                            { roi: 450, color: 'rgba(168, 85, 247, 0.8)', title: '3ª COL' },
                            { roi: 600, color: 'rgba(16, 185, 129, 0.9)', title: 'GOLD' },
                            { roi: 800, color: 'rgba(245, 158, 11, 0.9)', title: 'CHOKE' },
                            { roi: 1200, color: 'rgba(239, 68, 68, 0.95)', title: 'HYPER 🔱' }
                        );
                    } else {
                        escadinhaLevels.push(
                            { roi: 30, color: 'rgba(34, 197, 94, 0.5)', title: 'T1', key: 't1' },
                            { roi: 50, color: 'rgba(34, 197, 94, 0.7)', title: 'T2', key: 't2' },
                            { roi: 70, color: 'rgba(34, 197, 94, 0.9)', title: 'T3', key: 't3' },
                            { roi: 110, color: 'rgba(234, 179, 8, 0.9)', title: 'T4', key: 't4' },
                            { roi: 150, color: '#22c55e', title: 'T5', key: 't5' }
                        );
                    }

                    escadinhaLevels.forEach(lvl => {
                        let p = (points.isMoonbag || !lvl.key) ? null : points[lvl.key];
                        if (!p) {
                            const move = lvl.roi / (leverage * 100);
                            p = isLong ? points.entry * (1 + move) : points.entry * (1 - move);
                        }
                        levels.push({ value: p, label: lvl.title, color: lvl.color });
                    });
                    }
                }

                container.innerHTML = '';
                // Sort levels to handle overlaps
                levels.sort((a, b) => a.value - b.value);
                
                let lastY = -100;
                levels.forEach(lvl => {
                    const y = candlestickSeries.current.priceToCoordinate(lvl.value);
                    if (y === null || y < 0 || y > container.clientHeight) return;
                    
                    let adjustedY = y;
                    if (Math.abs(y - lastY) < 18) adjustedY = lastY + 18;
                    if (adjustedY > container.clientHeight - 10) return;
 
                    const badge = document.createElement('div');
                    badge.className = 'gutter-badge';
                    badge.style.top = (adjustedY - 8) + 'px';
                    badge.style.background = lvl.color;
                    badge.style.borderRightColor = lvl.color;
                    badge.innerText = lvl.label;
                    container.appendChild(badge);
                    lastY = adjustedY;
                });
            };

            // Update Data & Indicators
            useEffect(() => {
                if (candlestickSeries.current && historicalData.candles.length > 0) {
                    const candles = historicalData.candles;
                    candlestickSeries.current.setData(candles);
                    if (chartInstance.current.volumeSeries) chartInstance.current.volumeSeries.setData(historicalData.volumes);

                    if (eagleMode) {
                        if (window.calculateSMA) {
                            const sma21 = window.calculateSMA(candles, 21);
                            const sma100 = window.calculateSMA(candles, 100);
                            sma21SeriesRef.current.setData(sma21.filter(d => d !== null));
                            sma100SeriesRef.current.setData(sma100.filter(d => d !== null));
                        }
                    }

                    if (isFirstLoadRef.current && chartInstance.current) {
                        chartInstance.current.timeScale().setVisibleLogicalRange({
                            from: candles.length - 80,
                            to: candles.length
                        });
                        isFirstLoadRef.current = false;
                    }
                    
                    if (chartInstance.current.volumeSeries) chartInstance.current.volumeSeries.applyOptions({ visible: settings.volume });
                    if (sma21SeriesRef.current) sma21SeriesRef.current.applyOptions({ visible: settings.sma && eagleMode });
                    if (sma100SeriesRef.current) sma100SeriesRef.current.applyOptions({ visible: settings.sma && eagleMode });

                    syncGutter();
                }
            }, [historicalData, eagleMode, settings]);

            // [V110.380] Optimized Price Lines & Sentinel Marker
            useEffect(() => {
                const updatePriceLines = () => {
                    if (!candlestickSeries.current) return;

                    try {
                        const preActiveSlot = slots.find(s => s && s.symbol && normalizeTradeSymbol(s.symbol) === normalizeTradeSymbol(localSymbol));
                        const preActiveMoon = moonbags && moonbags.find(m => m && m.symbol && normalizeTradeSymbol(m.symbol) === normalizeTradeSymbol(localSymbol));
                        const preOrder = preActiveMoon || preActiveSlot || focusedAsset || {};
                        const preProjection = preOrder.projection || {};
                        const priceLineSignature = JSON.stringify({
                            symbol: normalizeTradeSymbol(localSymbol),
                            entry: preOrder.entry_price || preOrder.entry || 0,
                            stop: preOrder.current_stop || preOrder.stop_loss || preOrder.stopLoss || preOrder.sl || 0,
                            target: preOrder.target_price || preOrder.t5 || 0,
                            side: preOrder.side || '',
                            phase: preProjection.phase || '',
                            active: preProjection.active_level?.name || '',
                            levels: (preProjection.levels || []).map(l => [l.name, l.price, l.active])
                        });
                        if (priceLinesSignatureRef.current === priceLineSignature) return;
                        priceLinesSignatureRef.current = priceLineSignature;

                        // 1. Cleanup
                        if (priceLinesRef.current.entry) { try { candlestickSeries.current.removePriceLine(priceLinesRef.current.entry); } catch(e){} }
                        if (priceLinesRef.current.sl) { try { candlestickSeries.current.removePriceLine(priceLinesRef.current.sl); } catch(e){} }
                        if (priceLinesRef.current.tp) { try { candlestickSeries.current.removePriceLine(priceLinesRef.current.tp); } catch(e){} }
                        
                        if (priceLinesRef.current.targets) {
                            priceLinesRef.current.targets.forEach(l => { 
                                try { candlestickSeries.current.removePriceLine(l); } catch(e){} 
                            });
                            priceLinesRef.current.targets = [];
