<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1CRYPTEN — Kanban Hermes Guardian</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #06b6d4;
            font-family: 'Courier New', monospace;
            height: 100vh;
            overflow: hidden;
        }
        
        .container {
            display: flex;
            height: 100vh;
        }
        
        .sidebar {
            width: 300px;
            background: rgba(0,0,0,0.7);
            border-right: 2px solid #06b6d4;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
            padding: 15px;
            background: rgba(6, 182, 212, 0.1);
            border-radius: 8px;
            border: 1px solid #06b6d4;
        }
        
        .logo h1 {
            font-size: 18px;
            margin-bottom: 5px;
        }
        
        .logo p {
            font-size: 12px;
            opacity: 0.7;
        }
        
        .status-panel {
            background: rgba(6, 182, 212, 0.05);
            border: 1px solid #06b6d4;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }
        
        .status-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 13px;
        }
        
        .status-online {
            color: #10b981;
        }
        
        .status-offline {
            color: #ef4444;
        }
        
        .status-warning {
            color: #f59e0b;
        }
        
        .control-panel {
            flex: 1;
        }
        
        .control-btn {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            background: rgba(6, 182, 212, 0.1);
            border: 1px solid #06b6d4;
            color: #06b6d4;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            transition: all 0.3s ease;
        }
        
        .control-btn:hover {
            background: rgba(6, 182, 212, 0.2);
            border-color: #0891b2;
        }
        
        .control-btn.active {
            background: #06b6d4;
            color: #000;
        }
        
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            background: rgba(0,0,0,0.7);
            border-bottom: 2px solid #06b6d4;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h2 {
            font-size: 20px;
        }
        
        .header-actions {
            display: flex;
            gap: 10px;
        }
        
        .header-btn {
            padding: 8px 16px;
            background: rgba(6, 182, 212, 0.1);
            border: 1px solid #06b6d4;
            color: #06b6d4;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
        }
        
        .header-btn:hover {
            background: rgba(6, 182, 212, 0.2);
        }
        
        .workspace {
            flex: 1;
            position: relative;
            overflow: hidden;
        }
        
        #kanban-frame {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
        
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(6, 182, 212, 0.3);
            border-top: 3px solid #06b6d4;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .loading-text {
            color: #06b6d4;
            font-size: 14px;
        }
        
        .hidden {
            display: none !important;
        }
        
        .connection-status {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 15px;
            background: rgba(0,0,0,0.8);
            border: 1px solid #06b6d4;
            border-radius: 20px;
            font-size: 12px;
            z-index: 100;
        }
        
        .connection-status.online {
            border-color: #10b981;
            color: #10b981;
        }
        
        .connection-status.offline {
            border-color: #ef4444;
            color: #ef4444;
        }
    </style>
</head>
<body>
    <div class="connection-status" id="connection-status">
        <span id="connection-indicator">●</span> <span id="connection-text">Conectando...</span>
    </div>
    
    <div class="container">
        <div class="sidebar">
            <div class="logo">
                <h1>🤖 HERMES</h1>
                <p>Guardian Agent System</p>
            </div>
            
            <div class="status-panel">
                <h3 style="margin-bottom: 15px; font-size: 14px;">SISTEMA STATUS</h3>
                <div class="status-item">
                    <span>WebSocket:</span>
                    <span id="ws-status" class="status-offline">Offline</span>
                </div>
                <div class="status-item">
                    <span>Telegram:</span>
                    <span id="telegram-status" class="status-offline">Offline</span>
                </div>
                <div class="status-item">
                    <span>Railway:</span>
                    <span id="railway-status" class="status-offline">Offline</span>
                </div>
                <div class="status-item">
                    <span>Hermes Core:</span>
                    <span id="hermes-status" class="status-offline">Offline</span>
                </div>
            </div>
            
            <div class="control-panel">
                <button class="control-btn" onclick="toggleAutoRefresh()">🔄 Auto Refresh</button>
                <button class="control-btn" onclick="showLogs()">📋 Logs do Sistema</button>
                <button class="control-btn" onclick="showDiagnostics()">🔍 Diagnóstico</button>
                <button class="control-btn" onclick="showHelp()">❓ Ajuda</button>
                <button class="control-btn" onclick="goToCockpit()">⬅️ Voltar ao Cockpit</button>
            </div>
        </div>
        
        <div class="main-content">
            <div class="header">
                <h2>Kanban Guardian Workspace</h2>
                <div class="header-actions">
                    <button class="header-btn" onclick="refreshData()">🔄 Atualizar</button>
                    <button class="header-btn" onclick="toggleFullscreen()">🔍 Fullscreen</button>
                </div>
            </div>
            
            <div class="workspace">
                <div class="loading-overlay" id="loading-overlay">
                    <div class="loading-spinner"></div>
                    <div class="loading-text">Carregando Hermes Guardian...</div>
                </div>
                
                <iframe id="kanban-frame" src=""></iframe>
            </div>
        </div>
    </div>

    <script>
        let autoRefreshInterval = null;
        let connectionStatus = 'connecting';
        
        // Inicialização
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🚀 Hermes Guardian Interface Iniciada');
            
            // Verificar conexões
            checkConnections();
            
            // Carregar o Kanban
            setTimeout(loadKanban, 1000);
            
            // Iniciar verificação de status
            setInterval(checkConnections, 5000);
        });
        
        function loadKanban() {
            const frame = document.getElementById('kanban-frame');
            const loading = document.getElementById('loading-overlay');
            
            // URL de Produção do Hermes no Railway
            frame.src = 'https://1crypten-hermes-agent-production.up.railway.app';
            
            frame.onload = function() {
                loading.classList.add('hidden');
                console.log('✅ Kanban carregado com sucesso');
                updateConnectionStatus('online', 'Conectado');
            };
            
            frame.onerror = function() {
                loading.querySelector('.loading-text').textContent = 'Falha ao conectar com o serviço';
                updateConnectionStatus('offline', 'Erro de Conexão');
            };
        }
        
        function checkConnections() {
            // Simulação de verificação de conexões
            updateServiceStatus('ws-status', 'online', 'Online');
            updateServiceStatus('telegram-status', 'warning', 'Configurado');
            updateServiceStatus('railway-status', 'online', 'Online');
            updateServiceStatus('hermes-status', 'online', 'Ativo');
        }
        
        function updateServiceStatus(elementId, status, text) {
            const element = document.getElementById(elementId);
            element.className = 'status-' + status;
            element.textContent = text;
        }
        
        function updateConnectionStatus(status, text) {
            const statusElement = document.getElementById('connection-status');
            const indicator = document.getElementById('connection-indicator');
            const textElement = document.getElementById('connection-text');
            
            connectionStatus = status;
            statusElement.className = 'connection-status ' + status;
            indicator.textContent = status === 'online' ? '●' : '●';
            textElement.textContent = text;
        }
        
        function toggleAutoRefresh() {
            if (autoRefreshInterval) {
                clearInterval(autoRefreshInterval);
                autoRefreshInterval = null;
                console.log('⏹️ Auto Refresh desativado');
            } else {
                autoRefreshInterval = setInterval(refreshData, 30000); // 30 segundos
                console.log('▶️ Auto Refresh ativado (30s)');
            }
        }
        
        function refreshData() {
            console.log('🔄 Atualizando dados...');
            // Forçar recarregamento do iframe
            const frame = document.getElementById('kanban-frame');
            frame.src = frame.src;
        }
        
        function showLogs() {
            alert('📋 Logs do Sistema:\n\n✅ WebSocket: Ativo\n✅ Hermes Broker: Inicializado\n✅ Guardian: Monitorando posições\n📊 Railway: Conectado\n📱 Telegram: Configurado');
        }
        
        function showDiagnostics() {
            alert('🔍 Diagnóstico do Sistema:\n\n🟢 Serviços Backend: OK\n🟢 WebSocket: OK\n🟢 Hermes Agent: OK\n🟢 Railway: OK\n⚠️ MQTT: Desativado (paho-mqtt não disponível)\n💡 Recomendação: pip install paho-mqtt');
        }
        
        function showHelp() {
            alert('❓ Ajuda - Hermes Guardian:\n\n🎯 Sistema de gestão automática de posições\n🛡️ Trailing Stop e Knife-Drop automáticos\n📊 Monitoramento em tempo real\n🔄 Automação completa\n\n🔑 Senha de acesso: 123');
        }
        
        function goToCockpit() {
            window.location.href = 'cockpit.html';
        }
        
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
        
        // Detectar mudanças de conectividade
        window.addEventListener('online', function() {
            updateConnectionStatus('online', 'Conectado');
        });
        
        window.addEventListener('offline', function() {
            updateConnectionStatus('offline', 'Desconectado');
        });
    </script>
</body>
</html>
