<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>1CRYPTEN — Autenticação</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            color: #ffffff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .auth-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 3rem;
            width: 90%;
            max-width: 450px;
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }
        
        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #06b6d4 0%, #3b82f6 100%);
            border-radius: 20px;
            margin: 0 auto 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            color: white;
        }
        
        .input-group {
            position: relative;
            margin-bottom: 1.5rem;
        }
        
        .input-group input {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #06b6d4;
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.2);
        }
        
        .input-group label {
            position: absolute;
            left: 3rem;
            top: 1rem;
            color: #9ca3af;
            font-size: 1rem;
            transition: all 0.3s ease;
            pointer-events: none;
        }
        
        .input-group input:focus + label,
        .input-group input:not(:placeholder-shown) + label {
            top: -0.5rem;
            left: 1rem;
            font-size: 0.75rem;
            color: #06b6d4;
            background: rgba(10, 10, 10, 0.9);
            padding: 0 0.5rem;
            border-radius: 4px;
        }
        
        .btn-primary {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #06b6d4 0%, #3b82f6 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 1rem;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(6, 182, 212, 0.3);
        }
        
        .btn-secondary {
            width: 100%;
            padding: 1rem;
            background: transparent;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-secondary:hover {
            border-color: #06b6d4;
            background: rgba(6, 182, 212, 0.1);
        }
        
        .divider {
            text-align: center;
            margin: 2rem 0;
            position: relative;
        }
        
        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }
        
        .divider span {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            padding: 0 1rem;
            position: relative;
            color: #9ca3af;
            font-size: 0.875rem;
        }
        
        .auth-tabs {
            display: flex;
            margin-bottom: 2rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 4px;
        }
        
        .auth-tab {
            flex: 1;
            padding: 0.75rem;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
            font-size: 0.875rem;
        }
        
        .auth-tab.active {
            background: rgba(6, 182, 212, 0.2);
            color: #06b6d4;
        }
        
        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            padding: 0.75rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.875rem;
            text-align: center;
        }
        
        .success-message {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #10b981;
            padding: 0.75rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.875rem;
            text-align: center;
        }
        
        .loading {
            display: none;
            text-align: center;
            margin: 1rem 0;
        }
        
        .loading.show {
            display: block;
        }
        
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #06b6d4;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="logo">1C</div>
        
        <h1 class="text-3xl font-bold text-center mb-2" id="auth-title">Login</h1>
        <p class="text-center text-gray-400 mb-6" id="auth-subtitle">Acesse sua conta 1Crypten</p>
        
        <div class="auth-tabs">
            <div class="auth-tab active" data-tab="login">Login</div>
            <div class="auth-tab" data-tab="register">Cadastro</div>
        </div>
        
        <div id="error-message" class="error-message" style="display: none;"></div>
        <div id="success-message" class="success-message" style="display: none;"></div>
        
        <!-- Formulário de Login -->
        <form id="login-form">
            <div class="input-group">
                <input type="text" id="login-username" placeholder=" " required>
                <label for="login-username">Usuário</label>
            </div>
            
            <div class="input-group">
                <input type="password" id="login-password" placeholder=" " required>
                <label for="login-password">Senha</label>
            </div>
            
            <button type="submit" class="btn-primary">
                Entrar
            </button>
        </form>
        
        <!-- Formulário de Cadastro -->
        <form id="register-form" style="display: none;">
            <div class="input-group">
                <input type="text" id="register-username" placeholder=" " required>
                <label for="register-username">Usuário</label>
            </div>
            
            <div class="input-group">
                <input type="email" id="register-email" placeholder=" ">
                <label for="register-email">Email (opcional)</label>
            </div>
            
            <div class="input-group">
                <input type="password" id="register-password" placeholder=" " required>
                <label for="register-password">Senha</label>
            </div>
            
            <div class="input-group">
                <input type="password" id="register-confirm-password" placeholder=" " required>
                <label for="register-confirm-password">Confirmar Senha</label>
            </div>
            
            <button type="submit" class="btn-primary">
                Criar Conta
            </button>
        </form>
        
        <div class="divider">
            <span>ou</span>
        </div>
        
        <button class="btn-secondary" onclick="window.location.href='cockpit.html'">
            Acesso Rápido (admin/admin123)
        </button>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p class="text-center mt-2 text-gray-400">Processando...</p>
        </div>
    </div>

    <script>
        const API_BASE = '';
        let currentTab = 'login';
        
        // Configuração das abas
        const authTabs = document.querySelectorAll('.auth-tab');
        const loginForm = document.getElementById('login-form');
        const registerForm = document.getElementById('register-form');
        const authTitle = document.getElementById('auth-title');
        const authSubtitle = document.getElementById('auth-subtitle');
        
        authTabs.forEach(tab => {
            tab.addEventListener('click', () => {
                const tabName = tab.dataset.tab;
                switchTab(tabName);
            });
        });
        
        function switchTab(tabName) {
            currentTab = tabName;
            
            // Atualizar abas
            authTabs.forEach(t => t.classList.remove('active'));
            document.querySelector(`[data-tab="${tabName}"]`).classList.add('active');
            
            // Mostrar/ocultar formulários
            if (tabName === 'login') {
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
                authTitle.textContent = 'Login';
                authSubtitle.textContent = 'Acesse sua conta 1Crypten';
            } else {
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
                authTitle.textContent = 'Cadastro';
                authSubtitle.textContent = 'Crie sua conta 1Crypten';
            }
            
            // Limpar mensagens
            hideMessages();
        }
        
        function showLoading() {
            document.getElementById('loading').classList.add('show');
        }
        
        function hideLoading() {
            document.getElementById('loading').classList.remove('show');
        }
        
        function showError(message) {
            const errorDiv = document.getElementById('error-message');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            document.getElementById('success-message').style.display = 'none';
        }
        
        function showSuccess(message) {
            const successDiv = document.getElementById('success-message');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            document.getElementById('error-message').style.display = 'none';
        }
        
        function hideMessages() {
            document.getElementById('error-message').style.display = 'none';
            document.getElementById('success-message').style.display = 'none';
        }
        
        // Login
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;
            
            showLoading();
            hideMessages();
            
            try {
                const response = await fetch(`${API_BASE}/api/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username,
                        password
                    })
                });
                
                const data = await response.json();
                
                if (response.ok && data.access_token) {
                    // Salvar token
                    localStorage.setItem('auth_token', data.access_token);
                    localStorage.setItem('refresh_token', data.refresh_token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    
                    showSuccess('Login realizado com sucesso!');
                    
                    // Redirecionar para o cockpit após um breve delay
                    setTimeout(() => {
                        window.location.href = 'cockpit.html';
                    }, 1500);
                } else {
                    showError(data.detail || 'Usuário ou senha inválidos');
                }
            } catch (error) {
                console.error('Login error:', error);
                showError('Erro ao conectar com o servidor');
            } finally {
                hideLoading();
            }
        });
        
        // Cadastro
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('register-username').value;
            const email = document.getElementById('register-email').value;
            const password = document.getElementById('register-password').value;
            const confirmPassword = document.getElementById('register-confirm-password').value;
            
            // Validação
            if (password !== confirmPassword) {
                showError('As senhas não coincidem');
                return;
            }
            
            if (password.length < 8) {
                showError('A senha deve ter pelo menos 8 caracteres');
                return;
            }
            
            showLoading();
            hideMessages();
            
            try {
                const response = await fetch(`${API_BASE}/api/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username,
                        email,
                        password,
                        confirm_password: confirmPassword
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showSuccess('Conta criada com sucesso! Faça login para acessar.');
                    
                    // Mudar para aba de login após um breve delay
                    setTimeout(() => {
                        switchTab('login');
                    }, 2000);
                } else {
                    showError(data.detail || 'Erro ao criar conta');
                }
            } catch (error) {
                console.error('Register error:', error);
                showError('Erro ao conectar com o servidor');
            } finally {
                hideLoading();
            }
        });
        
        // Verificar se usuário já está logado
        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('auth_token');
            if (token) {
                // Redirecionar para cockpit se já estiver logado
                window.location.href = 'cockpit.html';
            }
        });
    </script>
</body>
</html>
