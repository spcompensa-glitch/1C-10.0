<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System 10D</title>
    <link rel="icon" type="image/png" href="logo10DTrasp.png?v=4">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000000;
            color: #ffffff;
            font-family: 'Outfit', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Estrelas sutis ao fundo */
        .stars-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image:
                radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.05), transparent),
                radial-gradient(1px 1px at 60% 70%, rgba(255,255,255,0.03), transparent),
                radial-gradient(2px 2px at 80% 20%, rgba(255,255,255,0.03), transparent);
            background-size: 250px 250px;
            z-index: 0;
            pointer-events: none;
        }

        .logo-container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2.5rem;
            text-align: center;
        }

        .boot-logo-container {
            position: relative;
            width: 120px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .boot-logo {
            width: 80px;
            height: 80px;
            z-index: 10;
            filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.5));
            animation: logo-pulse 2s infinite ease-in-out;
        }

        .boot-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: ring-expand 3s infinite linear;
        }

        .boot-ring:nth-child(2) { animation-delay: 1s; }
        .boot-ring:nth-child(3) { animation-delay: 2s; }

        .boot-scanner {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(to right, transparent, #ffffff, transparent);
            box-shadow: 0 0 15px #ffffff;
            animation: scan-vertical 2.5s infinite ease-in-out;
            z-index: 11;
        }

        .status-text {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 0.3em;
            animation: fade-pulse 2.5s ease-in-out infinite;
        }

        @keyframes logo-pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; filter: drop-shadow(0 0 30px rgba(255, 255, 255, 0.8)); }
        }

        @keyframes ring-expand {
            0% { transform: scale(0.8); opacity: 0.8; }
            100% { transform: scale(1.8); opacity: 0; }
        }

        @keyframes scan-vertical {
            0% { top: 0%; opacity: 0; }
            10%, 90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        @keyframes fade-pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }
    </style>
    <script>
        // Registra Service Worker cedo para acelerar carregamento via cache
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js?v=133').catch(() => {});
        }

        // Aguarda 3 segundos exibindo a animação completa antes de ir para a caixa de login
        setTimeout(() => {
            window.location.replace('/login');
        }, 3000);
    </script>
</head>
<body>
    <div class="stars-bg"></div>
    <div class="logo-container">
        <div class="boot-logo-container">
            <div class="boot-ring"></div>
            <div class="boot-ring"></div>
            <div class="boot-ring"></div>
            <div class="boot-scanner"></div>
            <img src="logo10DTrasp.png?v=4" class="boot-logo" alt="System 10D Logo" onerror="this.style.display='none'; this.parentElement.innerHTML='<div style=\'width: 80px; height: 80px; border: 1px solid rgba(255,255,255,0.1); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:32px; font-weight:900;\'>1C</div>'">
        </div>
        <div class="status-text">Inicializando Secure Core...</div>
    </div>
</body>
</html>
